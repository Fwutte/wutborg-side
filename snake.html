<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0e160c" />
  <title>Snake</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Base ── */
    body {
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      transition: background 0.4s;
    }

    button, a { -webkit-tap-highlight-color: transparent; }
    button { font: inherit; }
    button:focus-visible, a:focus-visible {
      outline: 3px solid #fff;
      outline-offset: 3px;
    }

    .site-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      width: min(100%, 920px);
      min-height: 60px;
      margin-bottom: 25px;
      padding: 9px 11px 9px 14px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      background: rgba(0,0,0,0.22);
      box-shadow: 0 12px 32px rgba(0,0,0,0.24);
      backdrop-filter: blur(14px);
    }

    .site-brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: inherit;
      text-decoration: none;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .site-brand-mark {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      color: #08120a;
      background: #7dcc5a;
      box-shadow: inset 0 -4px 8px rgba(20,50,12,0.25);
      font-size: 1.1rem;
      font-weight: 900;
    }

    .site-links {
      display: flex;
      gap: 6px;
    }

    .site-links a {
      padding: 9px 12px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      color: inherit;
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 750;
      opacity: 0.78;
      transition: opacity 0.2s, transform 0.2s, background 0.2s;
    }

    .site-links a:hover {
      opacity: 1;
      background: rgba(255,255,255,0.08);
      transform: translateY(-2px);
    }

    /* ── Neon theme ── */
    body[data-theme="neon"] {
      font-family: ui-monospace, "Cascadia Mono", "Courier New", monospace;
      background: #060610;
      color: #3a8;
    }
    body[data-theme="neon"] h1 {
      font-family: ui-monospace, "Cascadia Mono", "Courier New", monospace;
      font-size: 3.2rem; letter-spacing: 10px; color: #00ff88;
      text-shadow: 0 0 10px #00ff88, 0 0 30px #00ff88, 0 0 60px #00ff8866;
      margin-bottom: 4px;
    }
    body[data-theme="neon"] p { color: #3a8; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }
    body[data-theme="neon"] #info { font-family: ui-monospace, "Cascadia Mono", "Courier New", monospace; color: #3a8; font-size: 15px; letter-spacing: 2px; text-transform: uppercase; }
    body[data-theme="neon"] #info span span { color: #00ff88; text-shadow: 0 0 8px #00ff88; }
    body[data-theme="neon"] #difficulty-screen p { color: #3a8; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; }
    body[data-theme="neon"] #difficulty-screen button {
      font-family: ui-monospace, "Cascadia Mono", "Courier New", monospace; color: #00ff88;
      border: 1px solid #00ff8855; background: transparent;
    }
    body[data-theme="neon"] #difficulty-screen button:hover { background: #00ff8814; box-shadow: 0 0 14px #00ff8844; }

    /* CRT wrapper — only active in neon */
    body[data-theme="neon"] .crt-wrap {
      position: relative; border-radius: 4px; overflow: hidden;
      box-shadow: 0 0 0 1px #00ff8833, 0 0 30px #00ff8828, 0 0 80px #00ff8814, inset 0 0 40px #00000099;
    }
    body[data-theme="neon"] .crt-wrap::before {
      content: ""; position: absolute; inset: 0; z-index: 2; pointer-events: none;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 1px, rgba(0,0,0,0.13) 1px, rgba(0,0,0,0.13) 2px);
    }
    body[data-theme="neon"] .crt-wrap::after {
      content: ""; position: absolute; inset: 0; z-index: 3; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    }

    /* ── Realistic theme ── */
    body[data-theme="realistic"] {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0e160c;
      color: #aaa;
    }
    body[data-theme="realistic"] h1 {
      font-size: 2rem; letter-spacing: 4px; font-weight: 700;
      color: #6abf45; text-shadow: 0 2px 10px rgba(0,0,0,0.6);
      margin-bottom: 4px;
    }
    body[data-theme="realistic"] p { color: #4a6840; font-size: 12px; letter-spacing: 1px; }
    body[data-theme="realistic"] #info { color: #4a6840; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
    body[data-theme="realistic"] #info span span { color: #7dcc5a; font-weight: bold; }
    body[data-theme="realistic"] #difficulty-screen p { color: #4a6840; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
    body[data-theme="realistic"] #difficulty-screen button {
      color: #7dcc5a; border: 1px solid #3a5a28; background: #1a2e12; border-radius: 3px;
    }
    body[data-theme="realistic"] #difficulty-screen button:hover { background: #223818; }
    body[data-theme="realistic"] .crt-wrap {
      border-radius: 3px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.7), 0 0 0 2px #253a1a;
    }

    /* ── Shared ── */
    h1 { margin-bottom: 4px; }
    p { margin-bottom: 2px; }

    .crt-wrap {
      display: block;
      width: min(600px, calc(100vw - 32px), max(360px, calc(100vh - 350px)));
      margin-top: 14px;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      max-width: 600px;
      touch-action: none;
    }

    #info { display: flex; justify-content: center; gap: 40px; margin-top: 12px; }
    #score {
      display: inline-block;
      transition: transform 0.18s ease, color 0.18s ease, text-shadow 0.18s ease;
    }
    #score.score-pop {
      color: #fff;
      text-shadow: 0 0 14px currentColor;
      transform: scale(1.34);
    }
    #difficulty-screen { margin-top: 20px; }
    #difficulty-screen p { margin-bottom: 12px; }
    #difficulty-screen button {
      margin: 0 5px; padding: 9px 22px; font-size: 13px;
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; transition: background 0.15s;
      font-family: inherit;
    }

    /* ── Theme toggle ── */
    .theme-toggle {
      display: flex; gap: 0; margin-top: 14px;
      border: 1px solid #333; border-radius: 4px; overflow: hidden;
    }
    .theme-toggle button {
      padding: 6px 18px; font-size: 12px; letter-spacing: 1px;
      text-transform: uppercase; cursor: pointer; border: none;
      background: transparent; color: #555; font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .theme-toggle button.active {
      background: #222; color: #ddd;
    }
    body[data-theme="neon"] .theme-toggle { border-color: #00ff8833; }
    body[data-theme="neon"] .theme-toggle button { font-family: ui-monospace, "Cascadia Mono", "Courier New", monospace; color: #3a8; }
    body[data-theme="neon"] .theme-toggle button.active { background: #0a1a10; color: #00ff88; }
    body[data-theme="realistic"] .theme-toggle { border-color: #3a5a28; }
    body[data-theme="realistic"] .theme-toggle button { font-family: 'Segoe UI', Arial, sans-serif; color: #4a6840; }
    body[data-theme="realistic"] .theme-toggle button.active { background: #1a2e12; color: #7dcc5a; }

    /* ── Synlige spilkontroller ── */
    .game-controls {
      display: none;
      grid-template-columns: auto minmax(150px, 1fr);
      gap: 20px;
      align-items: center;
      width: min(100%, 600px);
      margin-top: 20px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      background: rgba(0,0,0,0.2);
      box-shadow: 0 12px 35px rgba(0,0,0,0.2);
    }

    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 58px);
      grid-template-rows: repeat(3, 52px);
      gap: 6px;
    }

    .direction-button,
    .game-action {
      border: 1px solid rgba(255,255,255,0.16);
      cursor: pointer;
      color: inherit;
      background: rgba(255,255,255,0.06);
      transition: transform 0.15s, background 0.15s, opacity 0.15s;
      touch-action: manipulation;
    }

    .direction-button {
      display: grid;
      place-items: center;
      border-radius: 13px;
      font-size: 1.45rem;
      font-weight: 900;
    }

    .direction-button:hover,
    .direction-button:active,
    .game-action:hover {
      background: rgba(125,204,90,0.18);
      transform: translateY(-2px);
    }

    .direction-button:disabled,
    .game-action:disabled {
      cursor: default;
      opacity: 0.35;
      transform: none;
    }

    .direction-button.up { grid-column: 2; grid-row: 1; }
    .direction-button.left { grid-column: 1; grid-row: 2; }
    .direction-button.down { grid-column: 2; grid-row: 2; }
    .direction-button.right { grid-column: 3; grid-row: 2; }

    .dpad-center {
      grid-column: 2;
      grid-row: 3;
      display: grid;
      place-items: center;
      color: currentColor;
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      opacity: 0.5;
      text-transform: uppercase;
    }

    .action-controls {
      display: grid;
      gap: 9px;
    }

    .game-action {
      min-height: 48px;
      padding: 0 15px;
      border-radius: 13px;
      font-weight: 800;
      letter-spacing: 0.03em;
    }

    .game-action.primary {
      color: #0b1708;
      background: #7dcc5a;
    }

    .control-help {
      color: inherit;
      font-size: 0.68rem;
      line-height: 1.5;
      opacity: 0.55;
    }

    body[data-theme="neon"] .game-controls {
      border-color: #00ff8833;
      background: rgba(0,18,10,0.62);
      box-shadow: 0 0 25px #00ff8812;
    }

    body[data-theme="neon"] .direction-button,
    body[data-theme="neon"] .game-action {
      border-color: #00ff8844;
      color: #00ff88;
      font-family: ui-monospace, "Cascadia Mono", "Courier New", monospace;
    }

    body[data-theme="neon"] .game-action.primary {
      color: #00170d;
      background: #00ff88;
    }

    body[data-theme="realistic"] .game-controls {
      border-color: #3a5a28;
      background: rgba(16,31,10,0.72);
    }

    body[data-theme="realistic"] .direction-button,
    body[data-theme="realistic"] .game-action {
      border-color: #3a5a28;
      color: #9ad579;
      background: #172510;
    }

    body[data-theme="realistic"] .game-action.primary {
      color: #101c0b;
      background: #7dcc5a;
    }

    @media (max-width: 620px) {
      body {
        padding: 10px 8px 24px;
      }

      .site-nav {
        margin-bottom: 20px;
        border-radius: 13px;
      }

      .site-brand {
        font-size: 0.85rem;
      }

      .site-brand span:last-child {
        display: none;
      }

      .site-links a {
        padding-inline: 10px;
        font-size: 0.7rem;
      }

      .site-links a[href="index.html"] {
        display: none;
      }

      body[data-theme="neon"] h1 {
        font-size: 2.6rem;
        letter-spacing: 7px;
      }

      .crt-wrap {
        width: min(100%, 600px);
      }

      #info {
        flex-wrap: wrap;
        gap: 8px 20px;
      }

      .game-controls {
        grid-template-columns: 1fr;
        width: min(100%, 420px);
      }

      .dpad {
        justify-self: center;
      }

      .action-controls {
        grid-template-columns: 1fr 1fr;
      }

      .control-help {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 430px) {
      .dpad {
        grid-template-columns: repeat(3, 54px);
        grid-template-rows: repeat(3, 49px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body data-theme="realistic">
  <nav class="site-nav" aria-label="Snake navigation">
    <a class="site-brand" href="minispil.html">
      <span class="site-brand-mark" aria-hidden="true">S</span>
      <span>Wutborg Snake</span>
    </a>
    <span class="site-links">
      <a href="minispil.html">← Minispil</a>
      <a href="index.html">Forsiden</a>
    </span>
  </nav>

  <h1 id="title">Snake</h1>
  <p>Piletaster / swipe &mdash; mellemrum for pause</p>

  <div class="theme-toggle">
    <button id="btn-realistic" onclick="setTheme('realistic')">Realistisk</button>
    <button id="btn-neon"      onclick="setTheme('neon')">Arkade</button>
  </div>

  <div id="difficulty-screen">
    <p style="margin-top:18px">Vælg sværhedsgrad</p>
    <button onclick="pickDifficulty('let')">Let</button>
    <button onclick="pickDifficulty('medium')">Medium</button>
    <button onclick="pickDifficulty('svær')">Svær</button>
  </div>

  <div id="info" style="display:none">
    <span>Score <span id="score">0</span></span>
    <span>Bedst <span id="highscore">0</span></span>
    <span id="difficulty-label"></span>
  </div>

  <div class="crt-wrap" id="crt-wrap">
    <canvas
      id="game"
      width="600"
      height="600"
      tabindex="0"
      aria-label="Snake spilleplade. Brug piletaster, swipe eller knapperne under pladen."
    ></canvas>
  </div>

  <div class="game-controls" id="game-controls" aria-label="Snake spilkontroller">
    <div class="dpad" aria-label="Retningsknapper">
      <button class="direction-button up" type="button" data-direction="UP" aria-label="Styr op">↑</button>
      <button class="direction-button left" type="button" data-direction="LEFT" aria-label="Styr til venstre">←</button>
      <button class="direction-button down" type="button" data-direction="DOWN" aria-label="Styr ned">↓</button>
      <button class="direction-button right" type="button" data-direction="RIGHT" aria-label="Styr til højre">→</button>
      <span class="dpad-center" aria-hidden="true">Styr</span>
    </div>

    <div class="action-controls">
      <button class="game-action primary" id="pause-button" type="button">⏸ Pause</button>
      <button class="game-action" id="restart-button" type="button">↻ Start forfra</button>
      <p class="control-help">Du kan også bruge piletaster, swipe og mellemrum.</p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx    = canvas.getContext("2d");
    const crtWrap         = document.getElementById("crt-wrap");
    const scoreText       = document.getElementById("score");
    const highscoreText   = document.getElementById("highscore");
    const difficultyLabel = document.getElementById("difficulty-label");
    const difficultyScreen = document.getElementById("difficulty-screen");
    const infoBar  = document.getElementById("info");
    const titleEl  = document.getElementById("title");
    const gameControls = document.getElementById("game-controls");
    const directionButtons = [...document.querySelectorAll(".direction-button")];
    const pauseButton = document.getElementById("pause-button");
    const restartButton = document.getElementById("restart-button");

    const box  = 30;
    const cols = canvas.width  / box;
    const rows = canvas.height / box;

    function lerp(a, b, t) { return a + (b-a)*t; }

    const DIFFICULTY = {
      let:    { base: 200, min: 120 },
      medium: { base: 150, min: 60  },
      svær:   { base: 100, min: 40  },
    };

    // ── Audio ──
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, type, dur, vol = 0.3) {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
      g.gain.setValueAtTime(vol, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      o.start(); o.stop(audioCtx.currentTime + dur);
    }
    const soundEat   = () => playTone(520, "sine", 0.1);
    const soundBonus = () => { playTone(660, "sine", 0.12); setTimeout(() => playTone(880, "sine", 0.12), 90); };
    const soundDie   = () => [280,200,140].forEach((f,i) => setTimeout(() => playTone(f,"sawtooth",0.22), i*130));

    // ── Highscore ──
    const getHS  = d   => parseInt(localStorage.getItem("snakeHS_" + d) || "0");
    const saveHS = (d,v) => localStorage.setItem("snakeHS_" + d, v);

    // ── Neon: stars ──
    const stars = Array.from({ length: 55 }, () => ({
      x: Math.random() * canvas.width,  y: Math.random() * canvas.height,
      r: Math.random() * 1.1 + 0.2,    speed: Math.random() * 0.18 + 0.04,
      opacity: Math.random() * 0.35 + 0.08,
    }));

    // ── Realistic: pre-rendered soil texture ──
    const bgCanvas = document.createElement("canvas");
    bgCanvas.width = canvas.width; bgCanvas.height = canvas.height;
    const bgCtx = bgCanvas.getContext("2d");
    // Base earth
    bgCtx.fillStyle = "#2a1c0f"; bgCtx.fillRect(0, 0, canvas.width, canvas.height);
    // Soil grain variation
    for (let i = 0; i < 1400; i++) {
      const x = Math.random() * canvas.width, y = Math.random() * canvas.height;
      const r = Math.random() * 2 + 0.4;
      const v = Math.random();
      bgCtx.fillStyle = v < 0.5
        ? `rgba(55,32,12,${0.35+Math.random()*0.45})`
        : `rgba(95,62,28,${0.2+Math.random()*0.3})`;
      bgCtx.beginPath(); bgCtx.arc(x, y, r, 0, Math.PI*2); bgCtx.fill();
    }
    // Small pebbles
    for (let i = 0; i < 55; i++) {
      const x = Math.random() * canvas.width, y = Math.random() * canvas.height;
      bgCtx.fillStyle = `rgba(75,55,35,${0.3+Math.random()*0.4})`;
      bgCtx.beginPath();
      bgCtx.ellipse(x, y, Math.random()*2.2+1, Math.random()*1.6+0.8, Math.random()*Math.PI, 0, Math.PI*2);
      bgCtx.fill();
    }
    // Dry grass tufts
    bgCtx.lineCap = "round";
    for (let i = 0; i < 40; i++) {
      const x = Math.random() * canvas.width, y = Math.random() * canvas.height;
      bgCtx.strokeStyle = `rgba(68,78,26,${0.28+Math.random()*0.3})`; bgCtx.lineWidth = 0.7;
      for (let b = 0; b < 3; b++) {
        const ox = (Math.random()-0.5)*5;
        bgCtx.beginPath(); bgCtx.moveTo(x+ox, y);
        bgCtx.quadraticCurveTo(x+ox+(Math.random()-0.5)*4, y-5, x+ox+(Math.random()-0.5)*6, y-7-Math.random()*4);
        bgCtx.stroke();
      }
    }
    // Faint grid for navigation
    bgCtx.strokeStyle = "rgba(0,0,0,0.1)"; bgCtx.lineWidth = 0.5;
    for (let x = 0; x <= canvas.width; x += box) { bgCtx.beginPath(); bgCtx.moveTo(x,0); bgCtx.lineTo(x,canvas.height); bgCtx.stroke(); }
    for (let y = 0; y <= canvas.height; y += box) { bgCtx.beginPath(); bgCtx.moveTo(0,y); bgCtx.lineTo(canvas.width,y); bgCtx.stroke(); }

    // ── Game state ──
    const BONUS_DURATION = 5000;
    const MAX_DIRECTION_BUFFER = 2;
    let difficulty, highscore = 0, score = 0;
    let snake, direction, nextDirection, directionQueue, food, bonusFood, updateTimer;
    let prevSnake = null, lastTickTime = 0, tickInterval = 200;
    let phase = "menu";
    let countdownNum = 3;
    let touchStartX = 0, touchStartY = 0;
    let gameTime = 0, lastFrameTime = 0, bonusSpawnAt = 0, bonusExpiresAt = 0;

    // ── Visual state ──
    let floatTexts = [], particles = [], foodPulse = 0, tongueFlick = 0, deathFlash = 0, gameOverTime = 0, screenShake = 0;

    // ── Theme ──
    let theme = localStorage.getItem("snakeTheme") || "realistic";

    function setTheme(t) {
      theme = t;
      localStorage.setItem("snakeTheme", t);
      document.body.setAttribute("data-theme", t);
      document.getElementById("btn-neon").classList.toggle("active", t === "neon");
      document.getElementById("btn-realistic").classList.toggle("active", t === "realistic");
      titleEl.textContent = t === "neon" ? "SNAKE" : "Snake";
    }
    setTheme(theme);

    // ══════════════════ RENDER LOOP ══════════════════
    function render(ts) {
      requestAnimationFrame(render);
      const dt = lastFrameTime ? Math.min(80, ts - lastFrameTime) : 0;
      lastFrameTime = ts;

      foodPulse   = ts * 0.003;
      tongueFlick = (tongueFlick + 1) % 70;
      floatTexts  = floatTexts.filter(t => t.life > 0);
      floatTexts.forEach(t => { t.y -= 1.1; t.life -= 0.04; });
      updateParticles(dt);

      if (phase === "menu") {
        drawMenuPreview(ts);
        return;
      }

      if (phase === "playing") {
        gameTime += dt;
        updateBonusFood();
      }

      ctx.save();
      if (screenShake > 0) {
        const wobble = screenShake;
        ctx.translate((Math.random() - 0.5) * wobble, (Math.random() - 0.5) * wobble);
        screenShake = screenShake < 0.25 ? 0 : screenShake * 0.86;
      }
      drawBackground();
      drawDangerFrame();
      drawFood();
      if (bonusFood) drawBonusFood();
      drawSnake();
      drawParticles();
      drawFloatTexts();

      if (deathFlash > 0) {
        ctx.fillStyle = `rgba(180,10,10,${deathFlash * 0.45})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        deathFlash = Math.max(0, deathFlash - 0.03);
      }
      ctx.restore();

      if (phase === "countdown") drawCountdownOverlay();
      if (phase === "paused")    drawPauseOverlay();
      if (phase === "gameover")  drawGameOverOverlay(ts);
    }
    requestAnimationFrame(render);

    function drawMenuPreview(ts) {
      drawBackground();

      const mouseX = canvas.width * 0.72 + Math.sin(ts * 0.0012) * 18;
      const mouseY = canvas.height * 0.47 + Math.cos(ts * 0.0016) * 12;
      if (theme === "neon") {
        drawGlossCircle(mouseX, mouseY, box * 0.42 + Math.sin(foodPulse) * 2, "#e02020", "#ff4444", 24);
      } else {
        drawMouse(mouseX, mouseY, 0.9 + Math.sin(foodPulse) * 0.04, "LEFT");
      }

      drawMenuSnake(ts);
      if (particles.length < 24 && Math.random() < 0.12) {
        addParticles(
          mouseX,
          mouseY,
          theme === "neon" ? "#00ff88" : "#d9b85a",
          1,
          1.1
        );
      }
      drawParticles();
    }

    function drawMenuSnake(ts) {
      const pts = [];
      const headX = canvas.width * 0.58 + Math.sin(ts * 0.0009) * 18;
      const headY = canvas.height * 0.56 + Math.cos(ts * 0.0011) * 10;
      for (let i = 0; i < 13; i++) {
        pts.push({
          x: headX - i * (box * 0.78),
          y: headY + Math.sin(ts * 0.004 + i * 0.68) * 20 + Math.cos(ts * 0.0015 + i) * 4
        });
      }

      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      if (theme === "neon") {
        const grad = ctx.createLinearGradient(pts[0].x, pts[0].y, pts[pts.length - 1].x, pts[pts.length - 1].y);
        grad.addColorStop(0, "#00ffdd");
        grad.addColorStop(0.4, "#00ff88");
        grad.addColorStop(1, "#064b20");
        ctx.lineWidth = box + 12;
        ctx.strokeStyle = "#00ff8815";
        ctx.shadowColor = "#00ff88";
        ctx.shadowBlur = 30;
        traceSmooth(pts, 0, 0);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.lineWidth = box - 2;
        ctx.strokeStyle = grad;
        traceSmooth(pts, 0, 0);
        ctx.stroke();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "rgba(255,255,255,0.18)";
        traceSmooth(pts, 0, 0);
        ctx.stroke();
      } else {
        ctx.globalAlpha = 0.32;
        ctx.lineWidth = box + 8;
        ctx.strokeStyle = "#000";
        traceSmooth(pts, 5, 6);
        ctx.stroke();
        ctx.globalAlpha = 1;

        const grad = ctx.createLinearGradient(pts[0].x, pts[0].y, pts[pts.length - 1].x, pts[pts.length - 1].y);
        grad.addColorStop(0, "#7fa855");
        grad.addColorStop(0.45, "#526f32");
        grad.addColorStop(1, "#273c12");
        ctx.lineWidth = box - 3;
        ctx.strokeStyle = grad;
        traceSmooth(pts, 0, 0);
        ctx.stroke();

        for (let i = 2; i < pts.length - 1; i += 2) {
          ctx.fillStyle = "rgba(12,32,5,0.34)";
          ctx.beginPath();
          ctx.ellipse(pts[i].x, pts[i].y - 6, 5, 3, 0, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.lineWidth = 3;
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        traceSmooth(pts, 0, 0);
        ctx.stroke();

        const head = pts[0];
        ctx.fillStyle = "#6f8e45";
        ctx.beginPath();
        ctx.ellipse(head.x + 3, head.y, box * 0.54, box * 0.62, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(8,26,4,0.45)";
        ctx.lineWidth = 1.3;
        ctx.stroke();
      }

      ctx.restore();
      drawTongue(pts[0], "RIGHT", true);
      drawEyes(pts[0], "RIGHT");
    }

    function drawDangerFrame() {
      if (phase !== "playing" || !snake || !snake[0]) return;
      const head = snake[0];
      const nearestWall = Math.min(
        head.x / box,
        head.y / box,
        (canvas.width - box - head.x) / box,
        (canvas.height - box - head.y) / box
      );
      const intensity = Math.max(0, (2.2 - nearestWall) / 2.2);
      if (intensity <= 0) return;

      ctx.save();
      ctx.lineWidth = 4 + intensity * 8;
      ctx.strokeStyle = theme === "neon"
        ? `rgba(255,60,80,${0.22 + intensity * 0.5})`
        : `rgba(225,88,42,${0.18 + intensity * 0.42})`;
      ctx.shadowColor = theme === "neon" ? "#ff3355" : "#d75a28";
      ctx.shadowBlur = 16 + intensity * 18;
      ctx.strokeRect(3, 3, canvas.width - 6, canvas.height - 6);
      ctx.restore();
    }

    function addParticles(x, y, color, count, power = 3) {
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const speed = 0.7 + Math.random() * power;
        particles.push({
          x,
          y,
          vx: Math.cos(a) * speed,
          vy: Math.sin(a) * speed,
          r: 1.6 + Math.random() * 3.4,
          life: 1,
          color
        });
      }
    }

    function updateParticles(dt) {
      const step = Math.max(0.25, dt / 16.67);
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => {
        p.x += p.vx * step;
        p.y += p.vy * step;
        p.vy += 0.035 * step;
        p.life -= 0.025 * step;
        p.r *= 0.992;
      });
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = theme === "neon" ? 12 : 4;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    }

    function popScore() {
      scoreText.classList.remove("score-pop");
      void scoreText.offsetWidth;
      scoreText.classList.add("score-pop");
      setTimeout(() => scoreText.classList.remove("score-pop"), 180);
    }

    // ══════════════════ DRAW: BACKGROUND ══════════════════
    function drawBackground() {
      if (theme === "neon") {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "#00ff8809"; ctx.lineWidth = 0.5;
        for (let x = 0; x <= canvas.width;  x += box) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
        for (let y = 0; y <= canvas.height; y += box) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
        stars.forEach(s => {
          s.y -= s.speed;
          if (s.y < -2) { s.y = canvas.height + 2; s.x = Math.random() * canvas.width; }
          ctx.globalAlpha = s.opacity;
          ctx.fillStyle = "#88ffcc";
          ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha = 1;
      } else {
        ctx.drawImage(bgCanvas, 0, 0);
      }
    }

    // ══════════════════ DRAW: FOOD ══════════════════
    function drawGlossCircle(cx, cy, r, base, glow, blur) {
      ctx.shadowColor = glow; ctx.shadowBlur = blur;
      ctx.fillStyle = base;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      const s = ctx.createRadialGradient(cx-r*0.32, cy-r*0.38, 0, cx, cy, r);
      s.addColorStop(0, "rgba(255,255,255,0.55)"); s.addColorStop(0.45, "rgba(255,255,255,0.08)"); s.addColorStop(1, "rgba(0,0,0,0.18)");
      ctx.fillStyle = s;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    }

    function drawMouse(cx, cy, scale, facing, golden = false) {
      // Head is at local (-x), so facing LEFT = angle 0 is correct
      const angle = { LEFT: 0, RIGHT: Math.PI, UP: Math.PI/2, DOWN: -Math.PI/2 }[facing] || 0;
      ctx.save();
      ctx.translate(cx, cy); ctx.rotate(angle); ctx.scale(scale * box/25, scale * box/25);

      ctx.shadowColor = "rgba(0,0,0,0.6)"; ctx.shadowBlur = 5; ctx.shadowOffsetY = 2;
      // Body oval
      const bg = ctx.createRadialGradient(-1, -2, 0.5, 2, 2, 10);
      if (golden) { bg.addColorStop(0,"#f5d458"); bg.addColorStop(0.5,"#c8900a"); bg.addColorStop(1,"#7a4e00"); }
      else        { bg.addColorStop(0,"#ccc");     bg.addColorStop(0.5,"#898989"); bg.addColorStop(1,"#3a3a3a"); }
      ctx.fillStyle = bg;
      ctx.beginPath(); ctx.ellipse(2.5, 0, 7.5, 5, 0, 0, Math.PI*2); ctx.fill();

      ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
      // Head circle
      const hg = ctx.createRadialGradient(-6.5, -2, 0.5, -5, 0, 5.5);
      if (golden) { hg.addColorStop(0,"#f0ca40"); hg.addColorStop(1,"#a07000"); }
      else        { hg.addColorStop(0,"#d8d8d8"); hg.addColorStop(1,"#5a5a5a"); }
      ctx.fillStyle = hg;
      ctx.beginPath(); ctx.arc(-5, 0, 4.5, 0, Math.PI*2); ctx.fill();
      // Ear outer
      ctx.fillStyle = golden ? "#c89010" : "#828282";
      ctx.beginPath(); ctx.ellipse(-6.8, -5.8, 2.2, 2.9, -0.3, 0, Math.PI*2); ctx.fill();
      // Ear inner
      ctx.fillStyle = golden ? "#e8c050" : "#c07082";
      ctx.beginPath(); ctx.ellipse(-6.8, -5.8, 1.3, 1.8, -0.3, 0, Math.PI*2); ctx.fill();
      // Eye
      ctx.fillStyle = golden ? "#2a1800" : "#111";
      ctx.beginPath(); ctx.arc(-6, -1.2, 1.3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.78)";
      ctx.beginPath(); ctx.arc(-6.45, -1.6, 0.55, 0, Math.PI*2); ctx.fill();
      // Snout bump
      ctx.fillStyle = golden ? "#c09020" : "#9a9a9a";
      ctx.beginPath(); ctx.ellipse(-8.8, 0.5, 1.7, 1.2, 0, 0, Math.PI*2); ctx.fill();
      // Nose tip
      ctx.fillStyle = golden ? "#e07000" : "#cc4455";
      ctx.beginPath(); ctx.ellipse(-10.2, 0.6, 1.1, 0.85, 0, 0, Math.PI*2); ctx.fill();
      // Whiskers — 3 per side radiating from snout
      ctx.strokeStyle = golden ? "rgba(220,180,70,0.7)" : "rgba(215,215,215,0.75)";
      ctx.lineWidth = 0.6; ctx.lineCap = "round";
      [[-3.5,-16.5],[-1.5,-17],[1,-16.5]].forEach(([wy,ex]) => {
        ctx.beginPath(); ctx.moveTo(-9,wy*0.35); ctx.lineTo(ex,wy); ctx.stroke();
      });
      [[3.5,-16.5],[1.5,-17],[-1,-16.5]].forEach(([wy,ex]) => {
        ctx.beginPath(); ctx.moveTo(-9,wy*0.35); ctx.lineTo(ex,wy); ctx.stroke();
      });
      // Tail — animated curl
      const tc = Math.sin(performance.now() * 0.0018 + cx * 0.05) * 4;
      ctx.strokeStyle = golden ? "#9a7010" : "#6e6e6e";
      ctx.lineWidth = 1.1; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(10, 0);
      ctx.bezierCurveTo(13, -3+tc, 16, 4.5-tc, 13.5, 8+tc*0.4);
      ctx.stroke();

      ctx.restore();
    }

    function drawFood() {
      const pulse = 1 + Math.sin(foodPulse) * (theme === "neon" ? 0.11 : 0.08);
      const cx = food.x + box/2, cy = food.y + box/2;
      if (theme === "neon") drawGlossCircle(cx, cy, (box/2-1)*pulse, "#e02020", "#ff0000", 24);
      else {
        let facing = food.facing || "LEFT";
        if (snake && snake[0]) {
          const dx = cx-(snake[0].x+box/2), dy = cy-(snake[0].y+box/2);
          if (Math.abs(dx)>=Math.abs(dy)) facing = dx>=0 ? "RIGHT" : "LEFT";
          else facing = dy>=0 ? "DOWN" : "UP";
        }
        drawMouse(cx, cy, pulse, facing);
      }
    }

    function drawBonusFood() {
      bonusFood.blink = ((bonusFood.blink || 0) + 1) % 7;
      if (bonusFood.blink >= 5) return;
      const cx = bonusFood.x + box/2, cy = bonusFood.y + box/2;
      const pulse = 1 + Math.sin(foodPulse * 1.7) * 0.1;
      if (theme === "neon") {
        drawGlossCircle(cx, cy, (box/2-1)*pulse, "#d4a000", "#ffcc00", 28);
        ctx.fillStyle = "#3a2a00"; ctx.font = "bold 9px ui-monospace, monospace"; ctx.textAlign = "center";
        ctx.fillText("+3", cx, cy+4);
      } else {
        let bfacing = bonusFood.facing || "RIGHT";
        if (snake && snake[0]) {
          const dx = cx-(snake[0].x+box/2), dy = cy-(snake[0].y+box/2);
          if (Math.abs(dx)>=Math.abs(dy)) bfacing = dx>=0 ? "RIGHT" : "LEFT";
          else bfacing = dy>=0 ? "DOWN" : "UP";
        }
        drawMouse(cx, cy, pulse, bfacing, true);
      }
      const remaining = bonusExpiresAt ? Math.max(0, bonusExpiresAt - gameTime) / BONUS_DURATION : 1;
      ctx.save();
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.strokeStyle = remaining < 0.35 ? "#ff5c42" : "#e6b800";
      ctx.shadowColor = ctx.strokeStyle;
      ctx.shadowBlur = theme === "neon" ? 16 : 5;
      ctx.beginPath();
      ctx.arc(cx, cy, box * 0.68, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * remaining);
      ctx.stroke();
      ctx.restore();
    }

    // ══════════════════ DRAW: SNAKE ══════════════════
    function drawSnake() {
      if (!snake || snake.length === 0) return;
      const now_ms = performance.now();
      const t = (lastTickTime > 0 && tickInterval > 0)
        ? Math.min(1, (now_ms - lastTickTime) / tickInterval) : 1;
      const prev = prevSnake || snake;
      // Interpolate between previous and current grid positions
      const basePts = snake.map((seg, i) => {
        const p = i < prev.length ? prev[i] : seg;
        return { x: lerp(p.x, seg.x, t) + box/2, y: lerp(p.y, seg.y, t) + box/2 };
      });
      // Serpentine undulation — head barely moves, tail swings wide
      let pts = basePts;
      if (theme === "realistic" && basePts.length >= 3) {
        pts = basePts.map((p, i) => {
          const pv = basePts[Math.max(0, i-1)];
          const nx = basePts[Math.min(basePts.length-1, i+1)];
          const dx = nx.x - pv.x, dy = nx.y - pv.y;
          const len = Math.sqrt(dx*dx+dy*dy) || 1;
          const perpX = -dy/len, perpY = dx/len;
          const fac = Math.pow(i / Math.max(1, basePts.length-1), 0.65);
          const wave = Math.sin(i*0.58 - now_ms*0.004) * 7 * fac;
          return { x: p.x + perpX*wave, y: p.y + perpY*wave };
        });
      }
      const n = pts.length;

      ctx.save();
      ctx.lineCap = "round"; ctx.lineJoin = "round";

      if (theme === "neon") {
        const grad = ctx.createLinearGradient(pts[0].x, pts[0].y, pts[n-1].x, pts[n-1].y);
        grad.addColorStop(0, "#00ffdd"); grad.addColorStop(0.35, "#00ff88"); grad.addColorStop(1, "#004422");

        ctx.lineWidth = box+12; ctx.strokeStyle = "#00ff880d";
        ctx.shadowColor = "#00ff88"; ctx.shadowBlur = 36;
        traceSmooth(pts, 0, 0); ctx.stroke(); ctx.shadowBlur = 0;

        ctx.lineWidth = box-2; ctx.strokeStyle = grad;
        ctx.shadowColor = "#00ffaa"; ctx.shadowBlur = 18;
        traceSmooth(pts, 0, 0); ctx.stroke(); ctx.shadowBlur = 0;

        ctx.lineWidth = 1.4; ctx.strokeStyle = "rgba(0,30,15,0.42)";
        for (let i = 1; i < n-1; i++) {
          const dx = pts[i+1].x-pts[i-1].x, dy = pts[i+1].y-pts[i-1].y;
          const angle = Math.atan2(dy, dx);
          ctx.beginPath(); ctx.arc(pts[i].x, pts[i].y, box/2-3, angle+Math.PI/2, angle+Math.PI*3/2); ctx.stroke();
        }
        ctx.lineWidth = 2.5; ctx.strokeStyle = "rgba(255,255,255,0.16)";
        traceSmooth(pts, 0, 0); ctx.stroke();

      } else {
        // 1 — Ground shadow
        ctx.globalAlpha = 0.38; ctx.lineWidth = box+8; ctx.strokeStyle = "#000";
        traceSmooth(pts, 5, 6); ctx.stroke(); ctx.globalAlpha = 1;

        // 2 — Body (olive gradient head→tail)
        const grad = ctx.createLinearGradient(pts[0].x, pts[0].y, pts[n-1].x, pts[n-1].y);
        grad.addColorStop(0, "#7a9e4e"); grad.addColorStop(0.4, "#527235"); grad.addColorStop(1, "#283e12");
        ctx.lineWidth = box-2; ctx.strokeStyle = grad;
        traceSmooth(pts, 0, 0); ctx.stroke();

        // 3 — Scale arcs (D-marks perpendicular to path)
        ctx.lineWidth = box*0.09; ctx.strokeStyle = "rgba(8,34,4,0.55)";
        for (let i = 1; i < n-1; i++) {
          const dx = pts[i+1].x-pts[i-1].x, dy = pts[i+1].y-pts[i-1].y;
          const angle = Math.atan2(dy, dx);
          ctx.beginPath(); ctx.arc(pts[i].x, pts[i].y, box/2-4, angle+Math.PI/2, angle+Math.PI*3/2); ctx.stroke();
        }

        // 4 — Alternating dark patches on flanks (checkered pattern)
        for (let i = 2; i < n-1; i += 2) {
          const pv = pts[Math.max(0,i-1)], nx2 = pts[Math.min(n-1,i+1)];
          const dx = nx2.x-pv.x, dy = nx2.y-pv.y, len = Math.sqrt(dx*dx+dy*dy)||1;
          const px = -dy/len*(box/2-5), py = dx/len*(box/2-5);
          const patchAngle = Math.atan2(dy, dx);
          ctx.fillStyle = "rgba(12,32,5,0.42)";
          ctx.beginPath(); ctx.ellipse(pts[i].x+px, pts[i].y+py, 5, 3.5, patchAngle, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.ellipse(pts[i].x-px, pts[i].y-py, 5, 3.5, patchAngle, 0, Math.PI*2); ctx.fill();
        }

        // 5 — Head cap: distinct wider oval, slightly different hue
        if (n >= 2) {
          const ha = Math.atan2(pts[0].y-pts[1].y, pts[0].x-pts[1].x);
          ctx.save();
          ctx.translate(pts[0].x, pts[0].y); ctx.rotate(ha);
          const hg = ctx.createRadialGradient(-box*0.12, -box*0.18, 0, box*0.08, box*0.08, box*0.62);
          hg.addColorStop(0, "#8aab55"); hg.addColorStop(0.5, "#5c7c3a"); hg.addColorStop(1, "#2e4018");
          ctx.fillStyle = hg;
          ctx.beginPath(); ctx.ellipse(box*0.07, 0, box/2+3, box/2+6, 0, 0, Math.PI*2); ctx.fill();
          ctx.strokeStyle = "rgba(8,26,4,0.45)"; ctx.lineWidth = 1.5;
          ctx.stroke();
          ctx.restore();
        }

        // 6 — Yellow collar (grass snake / Natrix natrix)
        if (n >= 3) {
          const ca = Math.atan2(pts[0].y-pts[Math.min(2,n-1)].y, pts[0].x-pts[Math.min(2,n-1)].x);
          ctx.save();
          ctx.translate(pts[1].x, pts[1].y); ctx.rotate(ca);
          ctx.fillStyle = "rgba(220,192,68,0.82)";
          ctx.beginPath(); ctx.ellipse(0, 0, box/2-2, box/2+1, 0, 0, Math.PI*2); ctx.fill();
          ctx.strokeStyle = "rgba(0,0,0,0.22)"; ctx.lineWidth = 1;
          ctx.stroke();
          ctx.restore();
        }

        // 7 — Per-segment 3D shading
        pts.forEach(p => {
          const r = box/2-1;
          const lit = ctx.createRadialGradient(p.x-4, p.y-4, 0, p.x+2, p.y+2, r+3);
          lit.addColorStop(0, "rgba(255,255,255,0.18)"); lit.addColorStop(0.45, "rgba(0,0,0,0)"); lit.addColorStop(1, "rgba(0,0,0,0.32)");
          ctx.fillStyle = lit;
          ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.fill();
        });

        // 8 — Belly stripe (cream, narrow)
        ctx.lineWidth = box*0.16; ctx.strokeStyle = "rgba(188,168,108,0.28)";
        traceSmooth(pts, 0, 0); ctx.stroke();

        // 9 — Top highlight
        ctx.lineWidth = 2.5; ctx.strokeStyle = "rgba(255,255,255,0.14)";
        traceSmooth(pts, 0, 0); ctx.stroke();

        // 10 — Dorsal stripe
        ctx.lineWidth = 3; ctx.strokeStyle = "rgba(12,32,5,0.52)";
        traceSmooth(pts, 0, 0); ctx.stroke();

        drawTongue(pts[0]);
      }

      ctx.restore();
      drawEyes(pts[0]);
    }

    function traceSmooth(pts, ox, oy) {
      if (!pts.length) return;
      ctx.beginPath(); ctx.moveTo(pts[0].x+ox, pts[0].y+oy);
      if (pts.length === 1) { ctx.arc(pts[0].x+ox, pts[0].y+oy, box/2-2, 0, Math.PI*2); return; }
      const m0 = { x:(pts[0].x+pts[1].x)/2+ox, y:(pts[0].y+pts[1].y)/2+oy };
      ctx.lineTo(m0.x, m0.y);
      for (let i = 1; i < pts.length-1; i++) {
        const mid = { x:(pts[i].x+pts[i+1].x)/2+ox, y:(pts[i].y+pts[i+1].y)/2+oy };
        ctx.quadraticCurveTo(pts[i].x+ox, pts[i].y+oy, mid.x, mid.y);
      }
      ctx.lineTo(pts[pts.length-1].x+ox, pts[pts.length-1].y+oy);
    }

    function drawEyes(head, eyeDirection = direction) {
      const e1 = box*0.25, e2 = box*0.21;
      const offsets = {
        RIGHT:[{x:e1,y:-e2},{x:e1,y:e2}], LEFT:[{x:-e1,y:-e2},{x:-e1,y:e2}],
        UP:[{x:-e2,y:-e1},{x:e2,y:-e1}],  DOWN:[{x:-e2,y:e1},{x:e2,y:e1}]
      };
      const isH = eyeDirection === "LEFT" || eyeDirection === "RIGHT";
      const eyeR = box*0.176;
      offsets[eyeDirection].forEach(e => {
        const ex = head.x+e.x, ey = head.y+e.y;
        if (theme === "neon") {
          ctx.fillStyle = "#001a0a"; ctx.beginPath(); ctx.arc(ex, ey, eyeR, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = "rgba(255,255,255,0.75)"; ctx.beginPath(); ctx.arc(ex-eyeR*0.3, ey-eyeR*0.3, eyeR*0.34, 0, Math.PI*2); ctx.fill();
        } else {
          ctx.fillStyle = "#c8a020"; ctx.beginPath(); ctx.arc(ex, ey, eyeR, 0, Math.PI*2); ctx.fill();
          ctx.save(); ctx.translate(ex, ey); ctx.scale(isH ? 0.35 : 1, isH ? 1 : 0.35);
          ctx.fillStyle = "#080808"; ctx.beginPath(); ctx.arc(0, 0, eyeR*0.8, 0, Math.PI*2); ctx.fill();
          ctx.restore();
          ctx.fillStyle = "rgba(255,255,255,0.55)"; ctx.beginPath(); ctx.arc(ex-eyeR*0.33, ey-eyeR*0.33, eyeR*0.3, 0, Math.PI*2); ctx.fill();
        }
      });
    }

    function drawTongue(head, tongueDirection = direction, force = false) {
      if ((!force && phase !== "playing") || tongueFlick > 22) return;
      const dir = { RIGHT:{dx:1,dy:0}, LEFT:{dx:-1,dy:0}, UP:{dx:0,dy:-1}, DOWN:{dx:0,dy:1} }[tongueDirection];
      const ext = box*0.38, frk = box*0.22;
      const base = { x:head.x+dir.dx*(box/2-1),   y:head.y+dir.dy*(box/2-1) };
      const tip  = { x:head.x+dir.dx*(box/2+ext),  y:head.y+dir.dy*(box/2+ext) };
      const p1   = { x:tip.x+dir.dx*frk-dir.dy*frk, y:tip.y+dir.dy*frk+dir.dx*frk };
      const p2   = { x:tip.x+dir.dx*frk+dir.dy*frk, y:tip.y+dir.dy*frk-dir.dx*frk };
      ctx.save(); ctx.strokeStyle = "#e01535"; ctx.lineWidth = 2.2; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(base.x, base.y); ctx.lineTo(tip.x, tip.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(tip.x, tip.y); ctx.lineTo(p1.x, p1.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(tip.x, tip.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
      ctx.restore();
    }

    // ══════════════════ DRAW: OVERLAYS ══════════════════
    function drawFloatTexts() {
      floatTexts.forEach(t => {
        ctx.globalAlpha = t.life; ctx.fillStyle = t.color;
        ctx.font = theme === "neon" ? "bold 14px ui-monospace, monospace" : "bold 13px Arial";
        ctx.textAlign = "center"; ctx.fillText(t.text, t.x, t.y);
      });
      ctx.globalAlpha = 1;
    }

    function overlayBg(alpha) {
      ctx.fillStyle = theme === "neon" ? `rgba(4,4,16,${alpha})` : `rgba(8,14,6,${alpha})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function bigText(text, x, y, color, size) {
      if (theme === "neon") {
        ctx.shadowColor = color; ctx.shadowBlur = 24;
        ctx.fillStyle = color; ctx.font = `${size}px ui-monospace, monospace`;
      } else {
        ctx.shadowBlur = 0;
        ctx.fillStyle = color; ctx.font = `bold ${Math.round(size*0.55)}px Arial`;
      }
      ctx.textAlign = "center"; ctx.fillText(text, x, y); ctx.shadowBlur = 0;
    }

    function subText(text, x, y, color) {
      ctx.fillStyle = color;
      ctx.font = theme === "neon" ? "13px ui-monospace, monospace" : "13px Arial";
      ctx.textAlign = "center"; ctx.fillText(text, x, y);
    }

    function drawCountdownOverlay() {
      overlayBg(0.54);
      const label = countdownNum > 0 ? String(countdownNum) : "GO!";
      const color = countdownNum > 0 ? (theme === "neon" ? "#ffffff" : "#ddd") : (theme === "neon" ? "#00ff88" : "#7dcc5a");
      bigText(label, canvas.width/2, canvas.height/2 + 34, color, countdownNum > 0 ? 110 : 82);
    }

    function drawPauseOverlay() {
      overlayBg(0.64);
      bigText("PAUSE", canvas.width/2, canvas.height/2 - 4, theme === "neon" ? "#00ff88" : "#7dcc5a", 72);
      subText("Mellemrum for at fortsætte", canvas.width/2, canvas.height/2 + 34, theme === "neon" ? "#3a8" : "#4a6840");
    }

    function drawGameOverOverlay(ts) {
      const fade = Math.min(1, (ts - gameOverTime) / 700);
      ctx.globalAlpha = fade;
      overlayBg(0.8);
      bigText("GAME OVER", canvas.width/2, canvas.height/2 - 44, theme === "neon" ? "#ff3333" : "#cc3322", 80);
      ctx.fillStyle = theme === "neon" ? "#ccc" : "#bbb";
      ctx.font = theme === "neon" ? "28px ui-monospace, monospace" : "22px Arial";
      ctx.textAlign = "center";
      ctx.fillText("Score: " + score, canvas.width/2, canvas.height/2 - 4);
      if (score > 0 && score >= highscore) {
        bigText("NY HIGHSCORE!", canvas.width/2, canvas.height/2 + 36, theme === "neon" ? "gold" : "#e6b800", 48);
      }
      subText("Tryk Enter for at spille igen", canvas.width/2, canvas.height/2 + 66, theme === "neon" ? "#3a8" : "#4a6840");
      subText("eller vælg sværhedsgrad nedenfor", canvas.width/2, canvas.height/2 + 84, theme === "neon" ? "#3a8" : "#4a6840");
      ctx.globalAlpha = 1;
    }

    // ══════════════════ GAME LOGIC ══════════════════
    function pickDifficulty(diff) {
      if (audioCtx.state === "suspended") audioCtx.resume();
      difficulty = diff;
      highscore  = getHS(diff);
      highscoreText.textContent = highscore;
      difficultyLabel.textContent = diff.charAt(0).toUpperCase() + diff.slice(1);
      difficultyScreen.style.display = "none";
      infoBar.style.display = "flex";
      crtWrap.style.display = "block";
      gameControls.style.display = "grid";
      beginRound();
      canvas.focus();
    }

    function beginRound() {
      difficultyScreen.style.display = "none";
      snake = [{ x:300, y:300 }, { x:270, y:300 }];
      prevSnake = null; lastTickTime = 0;
      direction = "RIGHT"; nextDirection = "RIGHT";
      directionQueue = [];
      gameTime = 0; bonusSpawnAt = 0; bonusExpiresAt = 0;
      score = 0; scoreText.textContent = 0;
      scoreText.classList.remove("score-pop");
      bonusFood = null; floatTexts = []; particles = [];
      spawnFood();
      clearTimeout(updateTimer);
      phase = "countdown"; countdownNum = 3;
      syncControls();
      const tick = () => {
        countdownNum--;
        if (countdownNum >= 0) setTimeout(tick, 700);
        else setTimeout(() => {
          phase = "playing";
          syncControls();
          scheduleBonusFood();
          scheduleUpdate();
        }, 500);
      };
      setTimeout(tick, 700);
    }

    function startGame() {
      highscore = getHS(difficulty);
      highscoreText.textContent = highscore;
      beginRound();
    }

    function spawnFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random()*cols)*box, y: Math.floor(Math.random()*rows)*box };
      } while (
        snake.some(p => p.x===pos.x && p.y===pos.y) ||
        (bonusFood && bonusFood.x===pos.x && bonusFood.y===pos.y)
      );
      food = { ...pos, facing: ["LEFT","RIGHT","UP","DOWN"][Math.floor(Math.random()*4)] };
    }

    function scheduleBonusFood() {
      bonusSpawnAt = gameTime + 8000 + Math.random() * 4000;
      bonusExpiresAt = 0;
    }

    function spawnBonusFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random()*cols)*box, y: Math.floor(Math.random()*rows)*box };
      } while (
        snake.some(p => p.x===pos.x && p.y===pos.y) ||
        (food && food.x===pos.x && food.y===pos.y)
      );
      bonusFood = { ...pos, blink: 0, facing: ["LEFT","RIGHT","UP","DOWN"][Math.floor(Math.random()*4)] };
      bonusExpiresAt = gameTime + BONUS_DURATION;
      addParticles(pos.x + box/2, pos.y + box/2, "#e6b800", 14, 2.8);
    }

    function updateBonusFood() {
      if (phase !== "playing") return;
      if (!bonusFood && gameTime >= bonusSpawnAt) {
        spawnBonusFood();
      }
      if (bonusFood && gameTime >= bonusExpiresAt) {
        bonusFood = null;
        scheduleBonusFood();
      }
    }

    function currentSpeed() {
      const { base, min } = DIFFICULTY[difficulty];
      return Math.max(min, base - score * 5);
    }

    function scheduleUpdate() {
      const delay = currentSpeed();
      tickInterval = delay;
      updateTimer = setTimeout(() => {
        if (phase === "playing") {
          prevSnake = snake.map(s => ({...s}));
          lastTickTime = performance.now();
          updateGame();
        }
        if (phase === "playing") scheduleUpdate();
      }, delay);
    }

    function updateGame() {
      if (directionQueue.length) {
        nextDirection = directionQueue.shift();
      }
      direction = nextDirection;
      let head = { ...snake[0] };
      if (direction === "UP")    head.y -= box;
      if (direction === "DOWN")  head.y += box;
      if (direction === "LEFT")  head.x -= box;
      if (direction === "RIGHT") head.x += box;

      if (head.x < 0 || head.y < 0 || head.x >= canvas.width || head.y >= canvas.height) { endGame(); return; }
      if (snake.some(p => p.x===head.x && p.y===head.y)) { endGame(); return; }

      snake.unshift(head);

      if (head.x===food.x && head.y===food.y) {
        score++; scoreText.textContent = score;
        popScore();
        floatTexts.push({ x:head.x+box/2, y:head.y-4, text:"+1", color: theme==="neon"?"#00ff88":"#7dcc5a", life:1 });
        addParticles(head.x+box/2, head.y+box/2, theme==="neon"?"#00ff88":"#7dcc5a", 18, 3.4);
        soundEat(); spawnFood();
      } else if (bonusFood && head.x===bonusFood.x && head.y===bonusFood.y) {
        score += 3; scoreText.textContent = score;
        popScore();
        floatTexts.push({ x:head.x+box/2, y:head.y-4, text:"+3", color:"#e6b800", life:1 });
        addParticles(head.x+box/2, head.y+box/2, "#e6b800", 30, 4.4);
        screenShake = Math.max(screenShake, 4);
        soundBonus(); bonusFood = null; scheduleBonusFood();
      } else {
        snake.pop();
      }
    }

    function endGame() {
      phase = "gameover";
      clearTimeout(updateTimer);
      deathFlash = 1; gameOverTime = performance.now();
      screenShake = Math.max(screenShake, 13);
      if (snake && snake[0]) {
        addParticles(snake[0].x+box/2, snake[0].y+box/2, theme==="neon"?"#ff3355":"#d75a28", 34, 5.2);
      }
      soundDie();
      if (score > highscore) {
        highscore = score; saveHS(difficulty, highscore);
        highscoreText.textContent = highscore;
      }
      difficultyScreen.style.display = "block";
      syncControls();
    }

    // ══════════════════ INPUT ══════════════════
    function setDirection(requestedDirection) {
      if (phase !== "playing") return;

      const opposite = {
        UP: "DOWN",
        DOWN: "UP",
        LEFT: "RIGHT",
        RIGHT: "LEFT"
      };

      const basisDirection = directionQueue.length ? directionQueue[directionQueue.length - 1] : nextDirection;
      if (requestedDirection === basisDirection || requestedDirection === opposite[basisDirection]) return;

      if (directionQueue.length >= MAX_DIRECTION_BUFFER) return;
      directionQueue.push(requestedDirection);
      nextDirection = directionQueue[0] || nextDirection;
    }

    function togglePause() {
      if (phase === "playing") {
        phase = "paused";
        clearTimeout(updateTimer);
      } else if (phase === "paused") {
        phase = "playing";
        scheduleUpdate();
      } else {
        return;
      }

      syncControls();
    }

    function restartRound() {
      if (!difficulty) return;
      beginRound();
      canvas.focus();
    }

    function syncControls() {
      const canSteer = phase === "playing";
      const canPause = phase === "playing" || phase === "paused";

      directionButtons.forEach(button => {
        button.disabled = !canSteer;
      });

      pauseButton.disabled = !canPause;
      pauseButton.textContent = phase === "paused" ? "▶ Fortsæt" : "⏸ Pause";
      pauseButton.setAttribute(
        "aria-label",
        phase === "paused" ? "Fortsæt spillet" : "Sæt spillet på pause"
      );
      restartButton.disabled = !difficulty;
    }

    directionButtons.forEach(button => {
      button.addEventListener("click", () => {
        setDirection(button.dataset.direction);
        canvas.focus();
      });
    });

    pauseButton.addEventListener("click", () => {
      togglePause();
      canvas.focus();
    });

    restartButton.addEventListener("click", restartRound);

    document.addEventListener("keydown", e => {
      if (phase === "gameover" && e.key === "Enter") { startGame(); return; }
      if (e.key === " ") {
        e.preventDefault();
        togglePause();
        return;
      }
      if (phase !== "playing") return;
      if (e.key.startsWith("Arrow")) e.preventDefault();
      if      (e.key === "ArrowUp")    setDirection("UP");
      else if (e.key === "ArrowDown")  setDirection("DOWN");
      else if (e.key === "ArrowLeft")  setDirection("LEFT");
      else if (e.key === "ArrowRight") setDirection("RIGHT");
    });

    canvas.addEventListener("touchstart", e => {
      touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; e.preventDefault();
    }, { passive: false });

    canvas.addEventListener("touchend", e => {
      if (phase === "gameover") { startGame(); return; }
      if (phase === "paused")   { togglePause(); return; }
      if (phase !== "playing")  return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0) setDirection("RIGHT");
        else setDirection("LEFT");
      } else {
        if (dy > 0) setDirection("DOWN");
        else setDirection("UP");
      }
      e.preventDefault();
    }, { passive: false });

    syncControls();
  </script>
</body>
</html>
