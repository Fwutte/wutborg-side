<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1730" />
  <title>Fire på stribe | Wutborg Arcade</title>
  <meta name="description" content="Spil Fire på stribe med to spillere." />
  <style>
    :root {
      --night: #07101f;
      --panel: #102746;
      --paper: #fffdf2;
      --muted: #9fb2cf;
      --yellow: #ffd84d;
      --red: #ff5d67;
      --blue: #3478e5;
      --hole: #08172b;
      --border: rgba(255, 255, 255, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      color: var(--paper);
      font-family: Inter, ui-rounded, "Arial Rounded MT Bold", system-ui, sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(52, 120, 229, 0.32), transparent 28rem),
        radial-gradient(circle at 85% 80%, rgba(255, 93, 103, 0.18), transparent 30rem),
        linear-gradient(145deg, #050b17, #0a1931 58%, #081225);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.22;
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.35) 1px, transparent 1.5px);
      background-size: 34px 34px;
      mask-image: linear-gradient(#000, transparent 88%);
    }

    button, a { -webkit-tap-highlight-color: transparent; }
    button { font: inherit; }

    .page {
      position: relative;
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 20px 0 42px;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: rgba(8, 22, 43, 0.72);
      backdrop-filter: blur(18px);
    }

    .brand {
      color: #fff;
      text-decoration: none;
      font-weight: 950;
      letter-spacing: -0.03em;
    }

    .nav-link {
      padding: 9px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 850;
    }

    .game-layout {
      display: grid;
      grid-template-columns: minmax(250px, 0.72fr) minmax(440px, 1.28fr);
      gap: clamp(24px, 5vw, 62px);
      align-items: center;
      min-height: calc(100vh - 130px);
    }

    .eyebrow {
      margin: 0 0 15px;
      color: var(--yellow);
      font-size: 0.74rem;
      font-weight: 950;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.1rem, 7vw, 6rem);
      line-height: 0.88;
      letter-spacing: -0.07em;
    }

    .description {
      margin: 24px 0 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .turn-card {
      margin-top: 30px;
      padding: 19px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: rgba(16, 39, 70, 0.68);
    }

    .turn-label {
      display: block;
      margin-bottom: 9px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 850;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .turn-value {
      display: flex;
      align-items: center;
      gap: 11px;
      font-size: 1.15rem;
      font-weight: 950;
    }

    .turn-disc {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 18px rgba(255, 93, 103, 0.45);
      transition: background 0.2s ease, box-shadow 0.2s ease;
    }

    .scores {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
      margin-top: 12px;
    }

    .score {
      padding: 13px 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 15px;
      background: rgba(5, 13, 27, 0.35);
      text-align: center;
    }

    .score strong {
      display: block;
      font-size: 1.2rem;
    }

    .score span {
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 800;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 15px;
    }

    .control {
      min-height: 44px;
      padding: 0 16px;
      border: 1px solid var(--border);
      border-radius: 999px;
      cursor: pointer;
      color: #fff;
      background: rgba(255, 255, 255, 0.07);
      font-weight: 900;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .control:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-2px);
    }

    .control.primary {
      border: 0;
      color: #15203a;
      background: var(--yellow);
    }

    .board-wrap {
      position: relative;
      display: grid;
      place-items: center;
      padding-top: 50px;
    }

    .column-buttons {
      position: absolute;
      z-index: 4;
      top: 0;
      left: 50%;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      width: min(100%, 640px);
      height: 76px;
      transform: translateX(-50%);
    }

    .column-button {
      position: relative;
      border: 0;
      cursor: pointer;
      background: transparent;
    }

    .column-button::after {
      content: "▼";
      position: absolute;
      left: 50%;
      bottom: 8px;
      color: rgba(255, 255, 255, 0.18);
      font-size: 1rem;
      opacity: 0;
      transform: translate(-50%, -8px);
      transition: opacity 0.18s ease, transform 0.18s ease, color 0.18s ease;
    }

    .column-button:hover::after,
    .column-button:focus-visible::after {
      color: var(--active-color, var(--red));
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .column-button:disabled { cursor: default; }

    .board {
      position: relative;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: clamp(6px, 1vw, 11px);
      width: min(100%, 640px);
      padding: clamp(13px, 2.5vw, 24px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 30px;
      background: linear-gradient(145deg, #4389f0, #2862cf);
      box-shadow:
        inset 0 5px 0 rgba(255, 255, 255, 0.14),
        inset 0 -9px 0 rgba(6, 31, 93, 0.2),
        0 34px 70px rgba(0, 0, 0, 0.35);
    }

    .cell {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 50%;
      background: var(--hole);
      box-shadow:
        inset 0 7px 12px rgba(0, 0, 0, 0.55),
        0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .piece {
      position: absolute;
      inset: 5%;
      border-radius: 50%;
      opacity: 0;
      transform: translateY(-720%);
    }

    .cell.red .piece {
      opacity: 1;
      background: radial-gradient(circle at 35% 30%, #ff9299, var(--red) 42%, #d83348);
      box-shadow: inset -6px -8px 12px rgba(122, 10, 28, 0.22), 0 0 16px rgba(255, 93, 103, 0.22);
      animation: drop 0.38s cubic-bezier(0.2, 0.8, 0.3, 1.15) forwards;
    }

    .cell.yellow .piece {
      opacity: 1;
      background: radial-gradient(circle at 35% 30%, #fff1a1, var(--yellow) 42%, #e8a91f);
      box-shadow: inset -6px -8px 12px rgba(129, 84, 0, 0.2), 0 0 16px rgba(255, 216, 77, 0.22);
      animation: drop 0.38s cubic-bezier(0.2, 0.8, 0.3, 1.15) forwards;
    }

    .cell.winner .piece {
      animation: win-pulse 0.75s ease-in-out infinite alternate;
    }

    .board.is-shaking {
      animation: board-shake 0.32s ease;
    }

    .message {
      position: fixed;
      z-index: 20;
      top: 24px;
      left: 50%;
      width: min(90%, 430px);
      padding: 16px 20px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: #fff;
      background: rgba(7, 16, 31, 0.92);
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.35);
      opacity: 0;
      pointer-events: none;
      text-align: center;
      transform: translate(-50%, -22px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      backdrop-filter: blur(16px);
      font-weight: 950;
    }

    .message.visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @keyframes drop {
      75% { transform: translateY(5%); }
      88% { transform: translateY(-9%); }
      100% { transform: translateY(0); }
    }

    @keyframes win-pulse {
      from { filter: brightness(1); transform: translateY(0) scale(1); }
      to { filter: brightness(1.35); transform: translateY(0) scale(0.82); }
    }

    @keyframes board-shake {
      25% { transform: translateX(-6px); }
      50% { transform: translateX(6px); }
      75% { transform: translateX(-3px); }
    }

    @media (max-width: 820px) {
      .game-layout {
        grid-template-columns: 1fr;
        min-height: 0;
      }

      .intro-panel {
        max-width: 650px;
        text-align: center;
        margin-inline: auto;
      }

      .turn-card { text-align: left; }
      .controls { justify-content: center; }
    }

    @media (max-width: 520px) {
      .page { width: min(100% - 16px, 470px); padding-top: 8px; }
      .nav { border-radius: 16px; }
      .board { border-radius: 20px; }
      .cell .piece { inset: 4%; }
      .game-layout { gap: 16px; }
      .description { margin-top: 16px; }
      .turn-card { margin-top: 19px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="message" role="status" aria-live="polite"></div>

  <div class="page">
    <nav class="nav">
      <a class="brand" href="minispil.html">Wutborg Arcade</a>
      <a class="nav-link" href="minispil.html">← Alle spil</a>
    </nav>

    <main class="game-layout">
      <section class="intro-panel">
        <p class="eyebrow">Spil 01 · To spillere</p>
        <h1>Fire på<br />stribe</h1>
        <p class="description">
          Spillerne skiftes til at vælge en kolonne. Få fire brikker på stribe
          vandret, lodret eller diagonalt for at vinde runden.
        </p>

        <div class="turn-card">
          <span class="turn-label">Status</span>
          <div class="turn-value">
            <span class="turn-disc" aria-hidden="true"></span>
            <span class="turn-text">Rød spiller</span>
          </div>

          <div class="scores" aria-label="Pointtavle">
            <div class="score"><strong class="red-score">0</strong><span>Rød</span></div>
            <div class="score"><strong class="draw-score">0</strong><span>Uafgjort</span></div>
            <div class="score"><strong class="yellow-score">0</strong><span>Gul</span></div>
          </div>

          <div class="controls">
            <button class="control primary new-round" type="button">Ny runde</button>
            <button class="control reset-score" type="button">Nulstil point</button>
          </div>
        </div>
      </section>

      <section class="board-wrap" aria-label="Fire på stribe spilleplade">
        <div class="column-buttons" aria-label="Vælg kolonne"></div>
        <div class="board"></div>
      </section>
    </main>
  </div>

  <script>
    const ROWS = 6;
    const COLS = 7;
    const boardElement = document.querySelector(".board");
    const buttonsElement = document.querySelector(".column-buttons");
    const turnText = document.querySelector(".turn-text");
    const turnDisc = document.querySelector(".turn-disc");
    const message = document.querySelector(".message");
    const newRoundButton = document.querySelector(".new-round");
    const resetScoreButton = document.querySelector(".reset-score");
    const redScoreElement = document.querySelector(".red-score");
    const yellowScoreElement = document.querySelector(".yellow-score");
    const drawScoreElement = document.querySelector(".draw-score");

    let board = [];
    let currentPlayer = "red";
    let gameOver = false;
    let score = { red: 0, yellow: 0, draw: 0 };
    let messageTimer;

    function createBoard() {
      boardElement.innerHTML = "";
      buttonsElement.innerHTML = "";

      for (let col = 0; col < COLS; col += 1) {
        const button = document.createElement("button");
        button.className = "column-button";
        button.type = "button";
        button.setAttribute("aria-label", `Slip brik i kolonne ${col + 1}`);
        button.addEventListener("click", () => playColumn(col));
        buttonsElement.appendChild(button);
      }

      for (let row = 0; row < ROWS; row += 1) {
        for (let col = 0; col < COLS; col += 1) {
          const cell = document.createElement("div");
          cell.className = "cell";
          cell.dataset.row = row;
          cell.dataset.col = col;
          cell.innerHTML = '<span class="piece"></span>';
          boardElement.appendChild(cell);
        }
      }
    }

    function startRound() {
      board = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
      currentPlayer = "red";
      gameOver = false;
      boardElement.classList.remove("is-shaking");
      document.querySelectorAll(".cell").forEach((cell) => {
        cell.className = "cell";
      });
      document.querySelectorAll(".column-button").forEach((button) => {
        button.disabled = false;
      });
      updateTurn();
      hideMessage();
    }

    function playColumn(col) {
      if (gameOver) return;

      let targetRow = -1;
      for (let row = ROWS - 1; row >= 0; row -= 1) {
        if (!board[row][col]) {
          targetRow = row;
          break;
        }
      }

      if (targetRow === -1) {
        boardElement.classList.remove("is-shaking");
        void boardElement.offsetWidth;
        boardElement.classList.add("is-shaking");
        showMessage("Den kolonne er fuld");
        return;
      }

      board[targetRow][col] = currentPlayer;
      const cell = getCell(targetRow, col);
      cell.classList.add(currentPlayer);

      const winningCells = findWinningCells(targetRow, col);
      if (winningCells.length) {
        endGame(winningCells);
        return;
      }

      if (board.every((row) => row.every(Boolean))) {
        gameOver = true;
        score.draw += 1;
        updateScore();
        disableColumns();
        turnText.textContent = "Runden blev uafgjort";
        showMessage("Uafgjort! Ingen ledige felter.");
        return;
      }

      currentPlayer = currentPlayer === "red" ? "yellow" : "red";
      updateTurn();
    }

    function getCell(row, col) {
      return boardElement.querySelector(`[data-row="${row}"][data-col="${col}"]`);
    }

    function findWinningCells(row, col) {
      const directions = [
        [0, 1],
        [1, 0],
        [1, 1],
        [1, -1]
      ];

      for (const [rowStep, colStep] of directions) {
        const cells = [[row, col]];

        for (const direction of [-1, 1]) {
          let nextRow = row + rowStep * direction;
          let nextCol = col + colStep * direction;

          while (
            nextRow >= 0 &&
            nextRow < ROWS &&
            nextCol >= 0 &&
            nextCol < COLS &&
            board[nextRow][nextCol] === currentPlayer
          ) {
            cells.push([nextRow, nextCol]);
            nextRow += rowStep * direction;
            nextCol += colStep * direction;
          }
        }

        if (cells.length >= 4) return cells;
      }

      return [];
    }

    function endGame(winningCells) {
      gameOver = true;
      score[currentPlayer] += 1;
      updateScore();
      disableColumns();

      winningCells.forEach(([row, col]) => {
        getCell(row, col).classList.add("winner");
      });

      const winner = currentPlayer === "red" ? "Rød" : "Gul";
      turnText.textContent = `${winner} vandt runden`;
      showMessage(`${winner} spiller fik fire på stribe!`);
    }

    function disableColumns() {
      document.querySelectorAll(".column-button").forEach((button) => {
        button.disabled = true;
      });
    }

    function updateTurn() {
      const isRed = currentPlayer === "red";
      const color = isRed ? "var(--red)" : "var(--yellow)";
      turnText.textContent = isRed ? "Rød spiller" : "Gul spiller";
      turnDisc.style.background = color;
      turnDisc.style.boxShadow = `0 0 18px ${isRed ? "rgba(255, 93, 103, 0.45)" : "rgba(255, 216, 77, 0.45)"}`;
      document.documentElement.style.setProperty("--active-color", color);
    }

    function updateScore() {
      redScoreElement.textContent = score.red;
      yellowScoreElement.textContent = score.yellow;
      drawScoreElement.textContent = score.draw;
    }

    function showMessage(text) {
      message.textContent = text;
      message.classList.add("visible");
      window.clearTimeout(messageTimer);
      messageTimer = window.setTimeout(hideMessage, 2200);
    }

    function hideMessage() {
      message.classList.remove("visible");
    }

    newRoundButton.addEventListener("click", startRound);
    resetScoreButton.addEventListener("click", () => {
      score = { red: 0, yellow: 0, draw: 0 };
      updateScore();
      startRound();
      showMessage("Pointtavlen er nulstillet");
    });

    document.addEventListener("keydown", (event) => {
      const column = Number(event.key) - 1;
      if (column >= 0 && column < COLS) playColumn(column);
    });

    createBoard();
    startRound();
  </script>
</body>
</html>
