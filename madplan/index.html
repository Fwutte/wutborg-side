<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1F3D2C">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Madplan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1F3EC;
    --surface:#FFFFFF;
    --surface-2:#FBFCF9;
    --ink:#1F3D2C;
    --ink-soft:#3A5446;
    --muted:#6E7C70;
    --line:#E1E6DB;
    --accent:#DD5A3A;
    --accent-soft:#FBEAE3;
    --radius:16px;
    --shadow:0 1px 2px rgba(31,61,44,.05), 0 8px 24px rgba(31,61,44,.06);
    --app-w:540px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Inter",system-ui,sans-serif;
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  [hidden]{display:none !important}
  body.auth-pending .app,
  body.auth-pending .tabbar{visibility:hidden}
  .app{
    max-width:var(--app-w);
    margin:0 auto;
    min-height:100dvh;
    padding:0 18px calc(96px + env(safe-area-inset-bottom));
    position:relative;
  }

  /* ---------- header ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:22px 2px 14px;
  }
  .top-actions{display:flex;align-items:center;gap:7px}
  .device-btn{
    width:40px;height:40px;border:1px solid var(--line);border-radius:999px;
    background:var(--surface);color:var(--ink);display:grid;place-items:center;
    box-shadow:var(--shadow);cursor:pointer;
  }
  .device-btn svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.8}
  .wordmark{
    font-family:"Fraunces",serif;
    font-size:25px;font-weight:600;letter-spacing:.01em;
    display:flex;align-items:center;gap:9px;
  }
  .wordmark .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);display:inline-block}
  .weeknav{
    display:flex;align-items:center;gap:4px;
    background:var(--surface);border:1px solid var(--line);
    border-radius:999px;padding:3px;box-shadow:var(--shadow);
  }
  .weeknav button{
    width:34px;height:34px;border:0;border-radius:999px;background:transparent;
    color:var(--ink);font-size:18px;cursor:pointer;display:grid;place-items:center;
  }
  .weeknav button:active{background:var(--paper)}
  .weeknav .label{font-size:13px;font-weight:600;padding:0 6px;min-width:54px;text-align:center}

  /* ---------- eyebrow ---------- */
  .eyebrow{
    font-size:11.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;
    color:var(--muted);margin:22px 4px 10px;
  }
  .eyebrow.row{display:flex;justify-content:space-between;align-items:center}
  .eyebrow .link{color:var(--accent);cursor:pointer;letter-spacing:.04em}

  /* ---------- today hero ---------- */
  .hero{
    background:var(--surface);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;
    border:1px solid var(--line);
  }
  .hero-inner{padding:20px 20px 18px;cursor:pointer}
  .hero-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .hero-top .tag{
    font-size:11px;font-weight:600;letter-spacing:.04em;
    color:var(--accent);background:var(--accent-soft);
    padding:3px 9px;border-radius:999px;text-transform:uppercase;
  }
  .hero-top .date{font-size:13px;color:var(--muted)}
  .hero-dish{
    font-family:"Fraunces",serif;font-weight:600;font-size:30px;
    line-height:1.12;color:var(--ink);margin:4px 0 12px;
  }
  .hero-dish.empty{color:var(--muted);font-style:italic;font-size:22px;font-weight:400}
  .hero-meta{display:flex;gap:16px;align-items:center;font-size:14px;color:var(--ink-soft)}
  .hero-meta span{display:flex;align-items:center;gap:6px}
  .hero-meta .ic{opacity:.6}
  .done-pill{
    margin-left:auto;font-size:12px;font-weight:600;border-radius:999px;
    padding:5px 11px;border:1px solid var(--line);color:var(--muted);background:var(--surface-2);
  }
  .done-pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* ---------- week list ---------- */
  .week{display:flex;flex-direction:column;gap:8px}
  .day{
    display:flex;align-items:center;gap:14px;
    background:var(--surface);border:1px solid var(--line);
    border-radius:14px;padding:13px 14px;cursor:pointer;
    transition:transform .08s ease, box-shadow .15s ease;
  }
  .day:hover{box-shadow:var(--shadow)}
  .day:active{transform:scale(.992)}
  .day.is-today{border-color:var(--accent);background:linear-gradient(0deg,var(--accent-soft),var(--surface) 70%)}
  .day .wd{
    width:38px;flex:none;text-align:center;
  }
  .day .wd b{display:block;font-size:13px;font-weight:600;text-transform:capitalize}
  .day .wd small{display:block;font-size:11px;color:var(--muted)}
  .day .body{flex:1;min-width:0}
  .day .dish{font-size:15.5px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .day .dish.empty{color:var(--muted);font-weight:400;font-style:italic}
  .day .sub{font-size:12.5px;color:var(--muted);margin-top:1px}
  .day .check{color:var(--accent);font-size:15px;flex:none}
  .day .chev{color:var(--muted);font-size:18px;flex:none;opacity:.5}

  /* ---------- dishes / shopping shared list ---------- */
  .list{display:flex;flex-direction:column;gap:8px}
  .card-row{
    display:flex;align-items:center;gap:12px;
    background:var(--surface);border:1px solid var(--line);
    border-radius:14px;padding:13px 14px;
  }
  .card-row.tap{cursor:pointer}
  .card-row.tap:active{transform:scale(.992)}
  .card-row .name{flex:1;font-size:15.5px;font-weight:500;min-width:0}
  .card-row .name .cat{display:block;font-size:12px;color:var(--muted);font-weight:400;margin-top:1px}
  .star{font-size:18px;border:0;background:none;cursor:pointer;color:var(--line);padding:4px}
  .star.on{color:#E0A23B}
  .check-row .box{
    width:24px;height:24px;border:2px solid var(--line);border-radius:7px;flex:none;
    display:grid;place-items:center;cursor:pointer;color:#fff;font-size:14px;transition:.12s;
  }
  .check-row.done .box{background:var(--ink);border-color:var(--ink)}
  .check-row.done .name{color:var(--muted);text-decoration:line-through}
  .qty{font-size:13px;color:var(--muted);flex:none}

  /* ---------- add bar ---------- */
  .addbar{display:flex;gap:8px;margin-bottom:14px}
  .addbar input{
    flex:1;border:1px solid var(--line);background:var(--surface);
    border-radius:12px;padding:13px 14px;font:inherit;font-size:15px;color:var(--ink);
  }
  .addbar select{
    border:1px solid var(--line);background:var(--surface);color:var(--ink);
    border-radius:12px;padding:0 12px;font:inherit;font-size:14px;font-weight:600;
    min-width:112px;
  }
  .addbar input:focus,
  .addbar select:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:transparent}
  .btn{
    border:0;border-radius:12px;padding:0 18px;font:inherit;font-weight:600;font-size:15px;
    cursor:pointer;background:var(--accent);color:#fff;display:grid;place-items:center;
  }
  .btn:active{filter:brightness(.95)}
  .btn.ghost{background:var(--surface);border:1px solid var(--line);color:var(--ink)}
  .btn.block{width:100%;padding:14px}

  .empty-note{
    text-align:center;color:var(--muted);font-size:14px;
    padding:34px 20px;border:1px dashed var(--line);border-radius:14px;background:var(--surface-2);
  }

  /* ---------- bottom tabbar ---------- */
  .tabbar{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:var(--app-w);
    display:flex;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);
    border-top:1px solid var(--line);
    padding:8px 12px calc(8px + env(safe-area-inset-bottom));
    z-index:30;
  }
  .tab{
    flex:1;background:none;border:0;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    color:var(--muted);font-size:11px;font-weight:600;padding:6px 0;
  }
  .tab svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.7}
  .tab.active{color:var(--accent)}

  /* ---------- bottom sheet ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(20,33,26,.42);
    opacity:0;pointer-events:none;transition:opacity .2s;z-index:40;
  }
  .overlay.open{opacity:1;pointer-events:auto}
  .sheet{
    position:fixed;left:50%;bottom:0;transform:translate(-50%,100%);
    width:100%;max-width:var(--app-w);
    background:var(--paper);border-radius:22px 22px 0 0;
    padding:8px 18px calc(22px + env(safe-area-inset-bottom));
    z-index:50;transition:transform .26s cubic-bezier(.2,.8,.2,1);
    max-height:90dvh;overflow-y:auto;
  }
  .sheet.open{transform:translate(-50%,0)}
  .grabber{width:38px;height:4px;border-radius:99px;background:var(--line);margin:8px auto 14px}
  .sheet h2{font-family:"Fraunces",serif;font-weight:600;font-size:22px;margin-bottom:2px}
  .sheet .sub{color:var(--muted);font-size:13px;margin-bottom:18px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
  .field input{width:100%;border:1px solid var(--line);background:var(--surface);border-radius:12px;padding:13px 14px;font:inherit;font-size:15px;color:var(--ink)}
  .field input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:transparent}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{
    border:1px solid var(--line);background:var(--surface);border-radius:999px;
    padding:9px 14px;font-size:14px;cursor:pointer;color:var(--ink);
  }
  .chip.sel{background:var(--ink);color:#fff;border-color:var(--ink)}
  .sheet-actions{display:flex;gap:8px;margin-top:6px}
  .toggle-done{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 14px;cursor:pointer;
  }
  .toggle-done .sw{width:44px;height:26px;border-radius:99px;background:var(--line);position:relative;transition:.18s;flex:none}
  .toggle-done .sw::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.18s}
  .toggle-done.on .sw{background:var(--ink)}
  .toggle-done.on .sw::after{transform:translateX(18px)}
  .link-danger{display:block;text-align:center;color:var(--accent);font-size:14px;font-weight:500;cursor:pointer;padding:14px;margin-top:4px}

  /* ---------- freezer ---------- */
  .freezer-summary{
    display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 0 14px;
  }
  .freezer-stat{
    background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:11px 10px;box-shadow:var(--shadow);
  }
  .freezer-stat b{display:block;font-size:18px;line-height:1;color:var(--ink)}
  .freezer-stat span{display:block;margin-top:5px;font-size:11px;color:var(--muted)}
  .freezer-search{margin-bottom:8px}
  .freezer-search input{
    width:100%;border:1px solid var(--line);background:var(--surface);
    border-radius:14px;padding:13px 14px;font:inherit;font-size:15px;color:var(--ink);
  }
  .freezer-search input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:transparent}
  .freezer-drawers{display:flex;flex-direction:column;gap:12px}
  .freezer-drawer{
    background:var(--surface-2);border:1px solid var(--line);border-radius:18px;
    padding:13px;box-shadow:var(--shadow);
  }
  .freezer-drawer-head{
    display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px;
  }
  .freezer-drawer-head h3{
    font-family:"Fraunces",serif;font-size:22px;font-weight:600;line-height:1.1;
  }
  .freezer-drawer-head small{
    display:block;font-family:"Inter",system-ui,sans-serif;color:var(--muted);
    font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:3px;
  }
  .freezer-count{
    border:1px solid var(--line);border-radius:999px;background:var(--surface);
    padding:5px 10px;color:var(--muted);font-size:12px;font-weight:600;white-space:nowrap;
  }
  .freezer-items{display:flex;flex-direction:column;gap:7px}
  .freezer-item{
    display:flex;align-items:center;gap:10px;background:var(--surface);
    border:1px solid var(--line);border-radius:13px;padding:10px 10px;cursor:pointer;
  }
  .freezer-item:active{transform:scale(.992)}
  .freezer-qty{
    min-width:58px;max-width:92px;flex:none;border-radius:10px;background:var(--paper);
    color:var(--ink);font-size:12px;font-weight:700;padding:7px 8px;text-align:center;
  }
  .freezer-qty.empty{color:var(--muted);font-weight:500}
  .freezer-name{flex:1;min-width:0}
  .freezer-name b{display:block;font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .freezer-name small{display:block;color:var(--muted);font-size:12px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .freezer-empty{
    border:1px dashed var(--line);border-radius:13px;padding:13px;color:var(--muted);
    font-size:13px;text-align:center;background:var(--surface);
  }

  /* ---------- toast ---------- */
  .toast{
    position:fixed;bottom:calc(96px + env(safe-area-inset-bottom));left:50%;transform:translate(-50%,16px);
    background:var(--ink);color:#fff;font-size:14px;font-weight:500;
    padding:11px 18px;border-radius:999px;opacity:0;pointer-events:none;
    transition:.22s;z-index:60;box-shadow:0 8px 24px rgba(0,0,0,.2);
  }
  .toast.show{opacity:1;transform:translate(-50%,0)}

  /* ---------- adgang ---------- */
  .auth-gate{
    position:fixed;inset:0;z-index:100;background:var(--paper);
    display:grid;place-items:center;padding:24px;
  }
  .auth-card{
    width:min(100%,420px);background:var(--surface);border:1px solid var(--line);
    border-radius:22px;padding:28px;box-shadow:var(--shadow);text-align:center;
  }
  .auth-mark{
    width:52px;height:52px;border-radius:16px;background:var(--accent-soft);
    color:var(--accent);display:grid;place-items:center;margin:0 auto 16px;
  }
  .auth-mark svg{width:27px;height:27px;fill:none;stroke:currentColor;stroke-width:1.8}
  .auth-card h1{font-family:"Fraunces",serif;font-size:28px;margin-bottom:8px}
  .auth-card p{color:var(--muted);font-size:14px;margin-bottom:14px}
  .auth-ip{display:block;min-height:20px;color:var(--ink-soft);font-size:12px;margin-bottom:18px}
  .auth-register{
    margin:16px 0 0;padding-top:16px;border-top:1px solid var(--line);
    display:flex;flex-direction:column;gap:10px;text-align:left;
  }
  .auth-register label{
    display:block;font-size:11px;font-weight:600;letter-spacing:.04em;
    text-transform:uppercase;color:var(--muted);margin-bottom:5px;
  }
  .auth-register input{
    width:100%;border:1px solid var(--line);background:var(--surface-2);
    border-radius:12px;padding:12px 13px;font:inherit;font-size:15px;color:var(--ink);
  }
  .auth-register input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:transparent}
  .device-list{display:flex;flex-direction:column;gap:8px;margin:14px 0}
  .device-entry{
    display:flex;align-items:center;gap:10px;background:var(--surface);
    border:1px solid var(--line);border-radius:12px;padding:11px 12px;
  }
  .device-entry .device-info{flex:1;min-width:0}
  .device-entry b{display:block;font-size:14px}
  .device-entry small{display:block;color:var(--muted);font-size:11px}
  .mini-danger{
    border:0;background:var(--accent-soft);color:var(--accent);border-radius:9px;
    padding:8px 10px;font:inherit;font-size:12px;font-weight:600;cursor:pointer;
  }

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important}
  }
  @media (max-width:430px){
    .topbar{gap:10px}
    .wordmark{font-size:22px}
    .top-actions{gap:5px;flex:none}
    .device-btn{width:36px;height:36px}
    .weeknav button{width:30px;height:30px}
    .weeknav .label{min-width:46px;padding:0 2px;font-size:12px}
    .tab{font-size:10px}
    .tab svg{width:21px;height:21px}
    .addbar{gap:6px}
    .addbar select{min-width:92px;padding:0 8px;font-size:12px}
    .addbar input{min-width:0}
    .btn{padding:0 13px}
    .freezer-summary{grid-template-columns:1fr 1fr 1fr;gap:6px}
    .freezer-stat{padding:10px 8px}
    .freezer-stat b{font-size:16px}
    .freezer-stat span{font-size:10px}
    .freezer-qty{min-width:48px;max-width:74px;padding:7px 6px}
  }
</style>
</head>
<body class="auth-pending">
<section class="auth-gate" id="authGate">
  <div class="auth-card">
    <div class="auth-mark">
      <svg viewBox="0 0 24 24"><path d="M7 11V8a5 5 0 0 1 10 0v3"/><rect x="5" y="11" width="14" height="10" rx="3"/><path d="M12 15v2"/></svg>
    </div>
    <h1>Madplanen er låst</h1>
    <p id="authMessage">Kontrollerer denne enhed …</p>
    <span class="auth-ip" id="authIp"></span>
    <button class="btn block" id="authRetry">Prøv igen</button>
    <div class="auth-register" id="authRegisterPanel" hidden>
      <div>
        <label for="authDeviceName">Navn på telefonen</label>
        <input id="authDeviceName" maxlength="60" autocomplete="off" value="Min Android">
      </div>
      <div>
        <label for="authSetupKey">Opsætningskode</label>
        <input id="authSetupKey" type="password" autocomplete="current-password">
      </div>
      <button class="btn block" id="authRegisterDevice">Godkend denne telefon</button>
    </div>
  </div>
</section>

<div class="app" id="appShell">
  <header class="topbar">
    <div class="wordmark"><span class="dot"></span><span id="wordmarkLabel">Madplan</span></div>
    <div class="top-actions">
      <button class="device-btn" id="deviceButton" aria-label="Administrer godkendte enheder">
        <svg viewBox="0 0 24 24"><path d="M7 11V8a5 5 0 0 1 10 0v3"/><rect x="5" y="11" width="14" height="10" rx="3"/><path d="M12 15v2"/></svg>
      </button>
      <nav class="weeknav">
        <button id="prevWeek" aria-label="Forrige uge">‹</button>
        <span class="label" id="weekLabel">Uge –</span>
        <button id="nextWeek" aria-label="Næste uge">›</button>
      </nav>
    </div>
  </header>

  <main id="view"></main>
</div>

<!-- bottom navigation -->
<nav class="tabbar">
  <button class="tab active" data-view="plan">
    <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h10"/></svg>
    Madplan
  </button>
  <button class="tab" data-view="dishes">
    <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M8 4v16M4 9h4"/></svg>
    Retter
  </button>
  <button class="tab" data-view="shopping">
    <svg viewBox="0 0 24 24"><path d="M6 7h13l-1.2 8.5a2 2 0 0 1-2 1.7H9.2a2 2 0 0 1-2-1.7L6 4H3"/><circle cx="9" cy="20" r="1"/><circle cx="17" cy="20" r="1"/></svg>
    Indkøb
  </button>
  <button class="tab" data-view="freezer">
    <svg viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18" rx="3"/><path d="M5 9h14M8 6h2M8 13h8M8 17h8"/></svg>
    Fryser
  </button>
</nav>

<!-- bottom sheet -->
<div class="overlay" id="overlay"></div>
<div class="sheet" id="sheet"></div>

<div class="toast" id="toast"></div>

<script src="auth.js"></script>
<script>
/* ============================================================
   DATALAG  (Cloudflare Pages Functions + D1)
   --------------------------------------------------------
   Render-funktionerne læser synkront fra cachen. Hver mutation
   gemmes i API'et og henter derefter den berørte del igen, så
   alle familiens enheder ser de samme data.
   ============================================================ */
const API = "/api";
const cache = {plan:{}, dishes:[], shopping:[], freezer:[]};
const FREEZER_DRAWERS = [
  {name:"Oksekød", label:"Skuffe 1"},
  {name:"Andet", label:"Skuffe 2"},
  {name:"Gris", label:"Skuffe 3"},
  {name:"Kylling", label:"Skuffe 4"},
  {name:"Brød", label:"Skuffe 5"},
  {name:"Blandet", label:"Skuffe 6"},
];

async function apiResult(response){
  if(response.ok) return response.json();
  const payload = await response.json().catch(()=>({}));
  throw new Error(payload.error || "API-kaldet fejlede");
}

const jget = (path) =>
  fetch(API+path, {headers:{"accept":"application/json"}}).then(apiResult);

const jsend = (method, path, body) => {
  const options = {method, headers:{"accept":"application/json"}};
  if(body !== undefined){
    options.headers["content-type"] = "application/json";
    options.body = JSON.stringify(body);
  }
  return fetch(API+path, options).then(apiResult);
};

async function loadWeek(){
  const from=iso(weekStart), to=iso(addDays(weekStart,6));
  const rows=await jget(`/plan?from=${from}&to=${to}`);
  const plan={};
  rows.filter(r=>r.meal_type==="aftensmad").forEach(r=>{
    plan[r.plan_date]={
      dishId:r.dish_id,
      name:r.dish_name,
      cook:r.cook || "",
      notes:r.notes || "",
      done:Number(r.is_done),
    };
  });
  cache.plan=plan;
}

async function loadDishes(){
  const rows=await jget("/dishes");
  cache.dishes=rows.map(d=>({
    id:Number(d.id),
    name:d.name,
    cat:d.category || "",
    fav:Number(d.is_favorite),
  }));
}

async function loadShopping(){
  const rows=await jget("/shopping");
  cache.shopping=rows.map(s=>({
    id:Number(s.id),
    name:s.name,
    qty:s.quantity || "",
    done:Number(s.is_checked),
  }));
}

async function loadFreezer(){
  const rows=await jget("/freezer");
  cache.freezer=rows.map(f=>({
    id:Number(f.id),
    drawer:f.drawer,
    name:f.name,
    qty:f.quantity || "",
    notes:f.notes || "",
  }));
}

const store = {
  init(){ return Promise.all([loadWeek(),loadDishes(),loadShopping(),loadFreezer()]); },
  loadWeek,
  async loadView(view){
    if(view==="plan") return loadWeek();
    if(view==="dishes") return loadDishes();
    if(view==="shopping") return loadShopping();
    return loadFreezer();
  },
  getPlan(dateISO){ return cache.plan[dateISO] ? {...cache.plan[dateISO]} : null; },
  async setPlan(dateISO,data){
    await jsend("PUT","/plan/"+encodeURIComponent(dateISO),{
      meal_type:"aftensmad",
      dish_id:data.dishId ?? null,
      dish_name:data.name,
      cook:data.cook || "",
      notes:data.notes || "",
      is_done:data.done ? 1 : 0,
    });
    await loadWeek();
  },
  async clearPlan(dateISO){
    await jsend("DELETE","/plan/"+encodeURIComponent(dateISO)+"?meal_type=aftensmad");
    await loadWeek();
  },
  getDishes(){ return cache.dishes.map(d=>({...d})); },
  async addDish(name,cat){
    await jsend("POST","/dishes",{name,category:cat || ""});
    await loadDishes();
  },
  async toggleFav(id){
    const dish=cache.dishes.find(d=>d.id===id);
    if(!dish) return;
    await jsend("PATCH","/dishes/"+id,{is_favorite:dish.fav?0:1});
    await loadDishes();
  },
  getShopping(){ return cache.shopping.map(s=>({...s})); },
  async addShop(name,quantity){
    await jsend("POST","/shopping",{name,quantity:quantity || ""});
    await loadShopping();
  },
  async toggleShop(id){
    const item=cache.shopping.find(s=>s.id===id);
    if(!item) return;
    await jsend("PATCH","/shopping/"+id,{is_checked:item.done?0:1});
    await loadShopping();
  },
  async clearChecked(){
    await jsend("DELETE","/shopping");
    await loadShopping();
  },
  getFreezer(){ return cache.freezer.map(f=>({...f})); },
  async addFreezer(item){
    await jsend("POST","/freezer",item);
    await loadFreezer();
  },
  async updateFreezer(id,item){
    await jsend("PATCH","/freezer/"+id,item);
    await loadFreezer();
  },
  async deleteFreezer(id){
    await jsend("DELETE","/freezer/"+id);
    await loadFreezer();
  },
};

/* ---------------- dato-hjælpere ---------------- */
const WD_SHORT=["Man","Tir","Ons","Tor","Fre","Lør","Søn"];
const WD_LONG =["mandag","tirsdag","onsdag","torsdag","fredag","lørdag","søndag"];
const MONTHS  =["januar","februar","marts","april","maj","juni","juli","august","september","oktober","november","december"];

function mondayOf(date){ const d=new Date(date); const day=(d.getDay()+6)%7; d.setHours(0,0,0,0); d.setDate(d.getDate()-day); return d; }
function addDays(date,n){ const d=new Date(date); d.setDate(d.getDate()+n); return d; }
function iso(date){ const d=new Date(date); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function isoWeek(date){
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  const day=(d.getUTCDay()+6)%7; d.setUTCDate(d.getUTCDate()-day+3);
  const firstThu=new Date(Date.UTC(d.getUTCFullYear(),0,4));
  const firstDay=(firstThu.getUTCDay()+6)%7; firstThu.setUTCDate(firstThu.getUTCDate()-firstDay+3);
  return 1+Math.round((d-firstThu)/(7*864e5));
}

function renderPlan(){

  const inThisWeek = iso(mondayOf(today))===iso(weekStart);

  const heroISO = iso(heroDate);
  const heroPlan = store.getPlan(heroISO);

  out.push(el(`<p class="eyebrow">${inThisWeek?"I dag":"Mandag"} · ${WD_LONG[(heroDate.getDay()+6)%7]} ${heroDate.getDate()}. ${MONTHS[heroDate.getMonth()]}</p>`));

  const hero = el(`
    <section class="hero"><div class="hero-inner">
      <div class="hero-top">
        <span class="tag">Aftensmad</span>
        <span class="date">${inThisWeek?"i dag":"ugens start"}</span>
        <span class="done-pill ${heroPlan&&heroPlan.done?"on":""}">${heroPlan&&heroPlan.done?"Klaret ✓":"Ikke lavet"}</span>
      </div>
      <div class="hero-dish ${heroPlan?"":"empty"}">${heroPlan?escape(heroPlan.name):"Ingen ret planlagt — tryk for at vælge"}</div>
      <div class="hero-meta">
        ${heroPlan&&heroPlan.cook?`<span><span class="ic">👩‍🍳</span>${escape(heroPlan.cook)}</span>`:`<span class="ic" style="color:var(--muted)">Tilføj hvem der laver mad</span>`}
        ${heroPlan&&heroPlan.notes?`<span><span class="ic">📝</span>${escape(heroPlan.notes)}</span>`:""}
      </div>
    </div></section>`);
  hero.querySelector(".hero-inner").addEventListener("click",()=>openSheet(heroISO));
  out.push(hero);

  out.push(el(`<p class="eyebrow">Hele ugen</p>`));
  const week = el(`<div class="week"></div>`);
  for(let i=0;i<7;i++){
    const d=addDays(weekStart,i), di=iso(d), p=store.getPlan(di);
    const isToday = di===todayISO;
    const row = el(`
      <div class="day ${isToday?"is-today":""}">
        <div class="wd"><b>${WD_SHORT[i]}</b><small>${d.getDate()}/${d.getMonth()+1}</small></div>

    row.addEventListener("click",()=>openSheet(di));
    week.append(row);
  }
  out.push(week);
  return out;
}

function splitFreezerInput(raw){
  const value=raw.trim().replace(/\s+/g," ");
  if(!value) return {name:"", quantity:""};

  const patterns=[
    /^(\d+\s*x\s+\d+\s*(?:g|kg|stk\.?|ps|pose|poser|pakke|pakker))\s+(.+)$/i,
    /^(\d+\s*x)\s+(.+)$/i,
    /^(\d+\/\d+\s+(?:pose|poser|ps|pakke|pakker|glas|boks))\s+(.+)$/i,
    /^(\d+\/\d+)\s+(.+)$/i,
    /^(\d+\s*(?:g|kg|stk\.?|ps|pose|poser|pakke|pakker|glas|boks))\s+(.+)$/i,
    /^(\d+)\s+(.+)$/i,
  ];

  for(const pattern of patterns){
    const match=value.match(pattern);
    if(match) return {quantity:match[1].trim(), name:match[2].trim()};
  }
  return {name:value, quantity:""};
}

function drawerMeta(drawer){
  return FREEZER_DRAWERS.find(d=>d.name===drawer) || {name:drawer,label:"Skuffe"};
}

function freezerMatches(item, query){
  if(!query) return true;
  const haystack=`${item.drawer} ${item.name} ${item.qty} ${item.notes}`.toLowerCase();
  return haystack.includes(query.toLowerCase());
}

function renderFreezer(){
  const out=[];
  const items=store.getFreezer();
  const drawerCounts=FREEZER_DRAWERS.map(drawer=>({
    ...drawer,
    count:items.filter(item=>item.drawer===drawer.name).length,
  }));
  const fullest=drawerCounts.reduce((best,drawer)=>drawer.count>best.count?drawer:best,drawerCounts[0]);

  out.push(el(`<p class="eyebrow row"><span>Fryseroverblik</span><span>${items.length} ting</span></p>`));
  out.push(el(`
    <section class="freezer-summary">
      <div class="freezer-stat"><b>${items.length}</b><span>Ting i alt</span></div>
      <div class="freezer-stat"><b>${drawerCounts.filter(d=>d.count).length}/6</b><span>Skuffer i brug</span></div>
      <div class="freezer-stat"><b>${escape(fullest.name)}</b><span>Mest fyldt</span></div>
    </section>`));

  const search=el(`<div class="freezer-search"><input id="freezerSearch" placeholder="Søg i fryseren" value="${escapeAttr(freezerQuery)}"></div>`);
  search.querySelector("#freezerSearch").addEventListener("input",e=>{
    const position=e.currentTarget.selectionStart;
    freezerQuery=e.currentTarget.value;
    render();
    requestAnimationFrame(()=>{
      const input=$("#freezerSearch");
      if(input){
        input.focus();
        input.setSelectionRange(position,position);
      }
    });
  });
  out.push(search);

  const add=el(`
    <div class="addbar">
      <select id="freezerDrawer" aria-label="Vælg skuffe">
        ${FREEZER_DRAWERS.map(d=>`<option value="${escapeAttr(d.name)}" ${d.name===freezerDrawer?"selected":""}>${escape(d.name)}</option>`).join("")}
      </select>
      <input id="newFreezerItem" placeholder="fx 2 x lasagne" maxlength="120">
      <button class="btn" id="addFreezerItem">Tilføj</button>
    </div>`);
  add.querySelector("#freezerDrawer").addEventListener("change",e=>{ freezerDrawer=e.currentTarget.value; });
  add.querySelector("#addFreezerItem").addEventListener("click",async()=>{
    const input=add.querySelector("#newFreezerItem");
    const parsed=splitFreezerInput(input.value);
    if(!parsed.name) return;
    const button=add.querySelector("#addFreezerItem");
    button.disabled=true;
    try{
      await store.addFreezer({drawer:freezerDrawer,name:parsed.name,quantity:parsed.quantity,notes:""});
      input.value="";
      render();
      toast("Lagt i fryseren");
    }catch(error){
      button.disabled=false;
      reportError(error,"Kunne ikke tilføje");
    }
  });
  add.querySelector("#newFreezerItem").addEventListener("keydown",e=>{
    if(e.key==="Enter") add.querySelector("#addFreezerItem").click();
  });
  out.push(add);

  const drawerWrap=el(`<div class="freezer-drawers"></div>`);
  FREEZER_DRAWERS.forEach(drawer=>{
    const drawerItems=items
      .filter(item=>item.drawer===drawer.name)
      .filter(item=>freezerMatches(item,freezerQuery));
    const totalInDrawer=items.filter(item=>item.drawer===drawer.name).length;
    const section=el(`
      <section class="freezer-drawer">
        <div class="freezer-drawer-head">
          <div><h3>${escape(drawer.name)}</h3><small>${escape(drawer.label)}</small></div>
          <span class="freezer-count">${totalInDrawer} ting</span>
        </div>
        <div class="freezer-items"></div>
      </section>`);
    const list=section.querySelector(".freezer-items");
    if(!drawerItems.length){
      list.append(el(`<div class="freezer-empty">${freezerQuery?"Ingen match i denne skuffe":"Tom skuffe"}</div>`));
    }else{
      drawerItems.forEach(item=>{
        const row=el(`
          <div class="freezer-item">
            <div class="freezer-qty ${item.qty?"":"empty"}">${item.qty?escape(item.qty):"?"}</div>
            <div class="freezer-name">
              <b>${escape(item.name)}</b>
              ${item.notes?`<small>${escape(item.notes)}</small>`:""}
            </div>
            <button class="mini-danger" aria-label="Slet ${escapeAttr(item.name)}">Slet</button>
          </div>`);
        row.addEventListener("click",()=>openFreezerSheet(item));
        row.querySelector("button").addEventListener("click",async e=>{
          e.stopPropagation();
          e.currentTarget.disabled=true;
          try{
            await store.deleteFreezer(item.id);
            render();
            toast("Slettet fra fryseren");
          }catch(error){
            e.currentTarget.disabled=false;
            reportError(error,"Kunne ikke slette");
          }
        });
        list.append(row);
      });
    }
    drawerWrap.append(section);
  });
  out.push(drawerWrap);
  return out;
}

    if(!selected || selected.name!==e.currentTarget.value){
      sheetDraft.dishId=null;
      chips.querySelectorAll(".chip").forEach(x=>x.classList.remove("sel"));
    }
  });
  sheet.querySelector("#fDone").addEventListener("click",e=>{ sheetDraft.done=sheetDraft.done?0:1; e.currentTarget.classList.toggle("on"); });
  sheet.querySelector("#fSave").addEventListener("click",async e=>{
    const name=sheet.querySelector("#fDish").value.trim();
    e.currentTarget.disabled=true;
    try{
      if(!name){ await store.clearPlan(sheetDate); }
      else await store.setPlan(sheetDate,{name, dishId:sheetDraft.dishId, cook:sheet.querySelector("#fCook").value.trim(), notes:sheet.querySelector("#fNote").value.trim(), done:sheetDraft.done});
      closeSheet(); render(); toast("Gemt");
    }catch(error){
      e.currentTarget.disabled=false; reportError(error);
    }
  });
  const clr=sheet.querySelector("#fClear");
  if(clr) clr.addEventListener("click",async()=>{
    try{
      await store.clearPlan(sheetDate); closeSheet(); render(); toast("Dagen ryddet");
    }catch(error){
      reportError(error);
    }
  });
  showSheet();
}

/* vælg dag når man trykker på en ret i biblioteket */
function openDayPicker(dish){
  const sheet=$("#sheet");
  sheet.innerHTML=`<div class="grabber"></div>
    <h2>${escape(dish.name)}</h2><p class="sub">På hvilken dag?</p>
    <div class="chips" id="dayChips" style="margin-bottom:8px"></div>`;
  const chips=sheet.querySelector("#dayChips");
  for(let i=0;i<7;i++){
    const d=addDays(weekStart,i), di=iso(d);
    const c=el(`<div class="chip">${WD_SHORT[i]} ${d.getDate()}/${d.getMonth()+1}</div>`);
    c.addEventListener("click",async()=>{
      c.style.pointerEvents="none";
      try{
        await store.setPlan(di,{name:dish.name, dishId:dish.id, cook:"", notes:"", done:0});
        closeSheet(); currentView="plan"; render(); toast(dish.name+" sat på "+WD_LONG[i]);
      }catch(error){
        c.style.pointerEvents=""; reportError(error);
      }
    });
    chips.append(c);
  }
  showSheet();
}

/* ---------------- godkendte enheder ---------------- */
async function openDeviceManager(){
  const sheet=$("#sheet");
  sheet.innerHTML=`<div class="grabber"></div>
    <h2>Godkendte enheder</h2>
    <p class="sub">Hver telefon har sin egen private nøgle.</p>
    <div class="empty-note">Henter enheder …</div>`;
  showSheet();

  try{
    const status=await window.madplanAuth.refreshStatus();
    const localDevice=await window.madplanAuth.getLocalDevice();
    const canUseSetupKey=Boolean(status.setup_key_configured);
    const canRegister=status.can_register || canUseSetupKey;

    sheet.innerHTML=`<div class="grabber"></div>
      <h2>Godkendte enheder</h2>
      <p class="sub">${status.can_register
        ?"Du er på en godkendt IP og kan registrere eller tilbagekalde enheder."
        :canUseSetupKey
          ?"Brug opsætningskoden til at registrere eller tilbagekalde enheder."
          :"Denne enhed er godkendt. Administration kræver godkendt IP eller opsætningskode."}</p>
      ${canRegister?`
        <div class="field">
          <label>Navn på denne enhed</label>
          <input id="deviceName" maxlength="60" value="${escapeAttr(localDevice?.name || (navigator.userAgent.includes("Android")?"Min Android":navigator.userAgent.includes("iPhone")?"Min iPhone":"Min enhed"))}">
        </div>
        ${canUseSetupKey && !status.can_register?`
          <div class="field">
            <label>Opsætningskode</label>
            <input id="deviceSetupKey" type="password" autocomplete="current-password">
          </div>
        `:""}
        <button class="btn block" id="registerDevice">${localDevice?"Erstat enhedsnøglen":"Godkend denne enhed"}</button>
        <p class="eyebrow">Aktive enheder</p>
        <div class="device-list" id="deviceList"></div>
        ${canUseSetupKey && !status.can_register?`<button class="btn ghost block" id="loadDevices" style="margin-top:8px">Vis aktive enheder</button>`:""}
      `:`
        <div class="device-entry">
          <div class="device-info">
            <b>${escape(status.device_name || localDevice?.name || "Godkendt enhed")}</b>
            <small>Privatnøglen forlader ikke denne browser</small>
          </div>
        </div>
      `}`;

    const setupKey=()=>sheet.querySelector("#deviceSetupKey")?.value || "";
    const renderDeviceList=async(devices)=>{
      const list=sheet.querySelector("#deviceList");
      list.innerHTML="";
      if(!devices.length){
        list.innerHTML=`<div class="empty-note">Ingen registrerede enheder endnu.</div>`;
      }
      devices.forEach(device=>{
        const current=device.id===localDevice?.id;
        const row=el(`<div class="device-entry">
          <div class="device-info">
            <b>${escape(device.name)}${current?" · denne enhed":""}</b>
            <small>${device.last_used_at?"Senest brugt "+escape(device.last_used_at):"Ikke brugt uden for hjemmet endnu"}</small>
          </div>
          <button class="mini-danger">Fjern</button>
        </div>`);
        row.querySelector("button").addEventListener("click",async e=>{
          e.currentTarget.disabled=true;
          try{
            await window.madplanAuth.revokeDevice(device.id,setupKey());
            toast("Enheden er fjernet");
            openDeviceManager();
          }catch(error){
            e.currentTarget.disabled=false;
            reportError(error,"Kunne ikke fjerne enheden");
          }
        });
        list.append(row);
      });
    };

    if(canRegister){
      if(status.can_register){
        await renderDeviceList(await window.madplanAuth.listDevices());
      }else{
        sheet.querySelector("#deviceList").innerHTML=
          `<div class="empty-note">Indtast opsætningskoden og tryk "Vis aktive enheder" for at administrere listen.</div>`;
        sheet.querySelector("#loadDevices")?.addEventListener("click",async e=>{
          e.currentTarget.disabled=true;
          try{
            await renderDeviceList(await window.madplanAuth.listDevices(setupKey()));
          }catch(error){
            e.currentTarget.disabled=false;
            reportError(error,"Kunne ikke hente enhederne");
          }
        });
      }

      sheet.querySelector("#registerDevice").addEventListener("click",async e=>{
        const name=sheet.querySelector("#deviceName").value.trim();
        if(!name) return;
        e.currentTarget.disabled=true;
        try{
          await window.madplanAuth.registerDevice(name,setupKey());
          toast("Enheden er godkendt");
          openDeviceManager();
        }catch(error){
          e.currentTarget.disabled=false;
          reportError(error,"Kunne ikke godkende enheden");
        }
      });
    }
  }catch(error){
    sheet.innerHTML=`<div class="grabber"></div>
      <h2>Godkendte enheder</h2>
      <div class="empty-note">${escape(error.message || "Enhederne kunne ikke hentes")}</div>`;
  }
}

function showSheet(){ $("#overlay").classList.add("open"); requestAnimationFrame(()=>$("#sheet").classList.add("open")); }
function closeSheet(){ $("#sheet").classList.remove("open"); $("#overlay").classList.remove("open"); }

/* ---------------- små utils ---------------- */
function escape(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function escapeAttr(s){ return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }

/* ---------------- events ---------------- */
$("#overlay").addEventListener("click",closeSheet);
$("#deviceButton").addEventListener("click",openDeviceManager);
async function changeWeek(days){
  const previous=weekStart;
  weekStart=addDays(weekStart,days);
  try{
    await store.loadWeek(); render();
  }catch(error){
    weekStart=previous; render(); reportError(error,"Kunne ikke hente ugen");
  }
}
$("#prevWeek").addEventListener("click",()=>changeWeek(-7));
$("#nextWeek").addEventListener("click",()=>changeWeek(7));
document.querySelectorAll(".tab").forEach(b=>b.addEventListener("click",async()=>{
  currentView=b.dataset.view;
  render();
  try{
    await store.loadView(currentView); render();
  }catch(error){
    reportError(error,"Kunne ikke hente data");
  }
}));

/* ---------------- start ---------------- */
render();
window.madplanAuth.ensureAccess().then(allowed=>{
  if(!allowed) return;
  store.init().then(render).catch(error=>reportError(error,"Kunne ikke hente data"));
});

/* registrér service worker (kun når siden serveres over http/https) */
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
